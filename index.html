<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;
      --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-2xl:1.25rem;--radius-full:9999px;
      --transition:200ms cubic-bezier(0.16,1,0.3,1);
      --transition-slow:400ms cubic-bezier(0.16,1,0.3,1);
    }
    [data-theme="dark"] {
      --bg:#0c0c0f;--surface:#141418;--surface-2:#1b1b20;--surface-3:#232329;--surface-4:#2a2a31;
      --border:rgba(255,255,255,0.07);--border-hover:rgba(255,255,255,0.15);
      --text:#eaeaec;--text-muted:#898992;--text-faint:#46464e;
      --primary:#7c6af7;--primary-hover:#9585f9;--primary-active:#5f4de8;
      --primary-bg:rgba(124,106,247,0.12);--primary-glow:rgba(124,106,247,0.3);
      --gold:#f59e0b;--green:#34d399;--red:#f87171;--blue:#60a5fa;--pink:#f472b6;
      --shadow:0 4px 32px rgba(0,0,0,0.5);--shadow-lg:0 16px 64px rgba(0,0,0,0.75);
    }
    [data-theme="light"] {
      --bg:#f0f0f5;--surface:#ffffff;--surface-2:#f4f4f9;--surface-3:#e8e8ef;--surface-4:#dddde6;
      --border:rgba(0,0,0,0.07);--border-hover:rgba(0,0,0,0.18);
      --text:#181820;--text-muted:#65656e;--text-faint:#aaaab5;
      --primary:#5c4ee0;--primary-hover:#7c6af7;--primary-active:#3d30c8;
      --primary-bg:rgba(92,78,224,0.09);--primary-glow:rgba(92,78,224,0.2);
      --gold:#d97706;--green:#059669;--red:#dc2626;--blue:#2563eb;--pink:#db2777;
      --shadow:0 4px 24px rgba(0,0,0,0.08);--shadow-lg:0 16px 48px rgba(0,0,0,0.15);
    }
    html { scroll-behavior:smooth; -webkit-font-smoothing:antialiased; }
    body { min-height:100dvh; font-family:'Inter',sans-serif; font-size:var(--text-base); color:var(--text); background:var(--bg); transition:background var(--transition-slow),color var(--transition-slow); overflow-x:hidden; }
    a,button,input,select,textarea { font:inherit; color:inherit; transition:all var(--transition); }
    button { cursor:pointer; background:none; border:none; }
    img { display:block; max-width:100%; }
    :focus-visible { outline:2px solid var(--primary); outline-offset:3px; border-radius:var(--radius-sm); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn { from{opacity:0}to{opacity:1} }
    @keyframes slideInLeft { from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)} }
    @keyframes cardEntrance { from{opacity:0;transform:scale(0.94) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)} }
    @keyframes shimmer { 0%{background-position:-200% 0}100%{background-position:200% 0} }
    @keyframes floatIcon { 0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)} }
    @keyframes toastIn { from{opacity:0;transform:translateX(40px) scale(0.9)}to{opacity:1;transform:translateX(0) scale(1)} }
    @keyframes toastOut { to{opacity:0;transform:translateX(40px) scale(0.9)} }
    @keyframes coverSlideUp { from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)} }
    @keyframes progressShine { 0%,100%{opacity:0}50%{opacity:1} }
    @keyframes starPop { 0%{transform:scale(1)}50%{transform:scale(1.45)}100%{transform:scale(1)} }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes confettiFall {
      0%{transform:translateY(-20px) rotate(0deg);opacity:1}
      100%{transform:translateY(110vh) rotate(720deg);opacity:0}
    }
    @keyframes ripple {
      0%{transform:scale(0);opacity:0.6}
      100%{transform:scale(2.5);opacity:0}
    }

    /* ===== LAYOUT ===== */
    .app { display:grid; grid-template-columns:260px 1fr; min-height:100dvh; }
    @media(max-width:768px){.app{grid-template-columns:1fr}}

    /* ===== SIDEBAR ===== */
    .sidebar {
      background:var(--surface); border-right:1px solid var(--border);
      padding:var(--space-6); display:flex; flex-direction:column; gap:var(--space-6);
      position:sticky; top:0; height:100dvh; overflow-y:auto;
      animation:slideInLeft 0.45s cubic-bezier(0.16,1,0.3,1) both;
    }
    @media(max-width:768px){.sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border);animation:none}}
    .logo { display:flex; align-items:center; gap:var(--space-3); font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:var(--text-lg); color:var(--text); text-decoration:none; }
    .logo-icon { color:var(--primary); filter:drop-shadow(0 0 10px var(--primary-glow)); transition:filter var(--transition); }
    .logo:hover .logo-icon { filter:drop-shadow(0 0 18px var(--primary-glow)); }
    .nav-section-title { font-size:var(--text-xs); font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-faint); margin-bottom:var(--space-2); }
    .nav-btn { width:100%; text-align:left; padding:var(--space-2) var(--space-3); border-radius:var(--radius-md); color:var(--text-muted); font-size:var(--text-sm); font-weight:500; display:flex; align-items:center; gap:var(--space-2); position:relative; overflow:hidden; }
    .nav-btn::before { content:''; position:absolute; inset:0; background:var(--primary-bg); opacity:0; transition:opacity var(--transition); }
    .nav-btn:hover::before { opacity:0.5; }
    .nav-btn:hover { color:var(--text); }
    .nav-btn.active::before { opacity:1; }
    .nav-btn.active { color:var(--primary); font-weight:600; }
    .nav-badge { margin-left:auto; background:var(--surface-3); color:var(--text-muted); font-size:var(--text-xs); padding:0.1rem 0.45rem; border-radius:var(--radius-full); font-weight:700; transition:background var(--transition),color var(--transition); }
    .nav-btn.active .nav-badge { background:var(--primary-bg); color:var(--primary); }
    .sidebar-footer { margin-top:auto; display:flex; align-items:center; justify-content:space-between; }
    .theme-toggle { padding:var(--space-2); border-radius:var(--radius-md); color:var(--text-muted); display:flex; align-items:center; justify-content:center; }
    .theme-toggle:hover { background:var(--surface-2); color:var(--text); }

    /* ===== MAIN ===== */
    .main { padding:var(--space-8); display:flex; flex-direction:column; gap:var(--space-8); animation:fadeUp 0.45s 0.1s cubic-bezier(0.16,1,0.3,1) both; }
    @media(max-width:768px){.main{padding:var(--space-4)}}
    .page-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:var(--space-4); }
    .page-title { font-family:'Space Grotesk',sans-serif; font-size:var(--text-xl); font-weight:700; }
    .page-title span { color:var(--primary); }

    /* ===== SEARCH ===== */
    .search-wrap { position:relative; max-width:480px; flex:1; }
    .search-icon { position:absolute; left:var(--space-3); top:50%; transform:translateY(-50%); color:var(--text-faint); pointer-events:none; transition:color var(--transition); }
    .search-wrap:focus-within .search-icon { color:var(--primary); }
    .search-clear { position:absolute; right:var(--space-3); top:50%; transform:translateY(-50%); color:var(--text-faint); padding:2px; border-radius:var(--radius-sm); display:none; align-items:center; justify-content:center; }
    .search-clear:hover { color:var(--text); }
    .search-clear.visible { display:flex; }
    .search-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:var(--space-3) 2.25rem var(--space-3) 2.5rem; color:var(--text); font-size:var(--text-sm); }
    .search-input::placeholder { color:var(--text-faint); }
    .search-input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-bg); }
    .search-results { position:absolute; top:calc(100% + var(--space-2)); left:0; right:0; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); z-index:200; max-height:420px; overflow-y:auto; display:none; animation:fadeUp 0.2s cubic-bezier(0.16,1,0.3,1); scrollbar-width:thin; scrollbar-color:var(--surface-3) transparent; }
    .search-results.open { display:block; }
    .search-result-item { display:flex; align-items:center; gap:var(--space-3); padding:var(--space-3); cursor:pointer; border-bottom:1px solid var(--border); transition:background var(--transition); }
    .search-result-item:last-child { border-bottom:none; }
    .search-result-item:hover { background:var(--surface-2); }
    .search-result-img { width:40px; height:56px; object-fit:cover; border-radius:var(--radius-sm); background:var(--surface-3); flex-shrink:0; }
    .search-result-info { flex:1; min-width:0; }
    .search-result-title { font-weight:600; font-size:var(--text-sm); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .search-result-meta { font-size:var(--text-xs); color:var(--text-muted); margin-top:2px; }
    .search-add-btn { padding:var(--space-1) var(--space-3); background:var(--primary-bg); color:var(--primary); border-radius:var(--radius-full); font-size:var(--text-xs); font-weight:600; white-space:nowrap; flex-shrink:0; }
    .search-add-btn:hover { background:var(--primary); color:#fff; }
    .search-add-btn.added { background:rgba(52,211,153,0.15); color:var(--green); pointer-events:none; }
    .search-loading,.search-empty { padding:var(--space-6); text-align:center; color:var(--text-muted); font-size:var(--text-sm); }
    .search-spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:var(--space-2); }
    .search-section-header { padding:var(--space-2) var(--space-3); font-size:var(--text-xs); font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-faint); background:var(--surface-2); border-bottom:1px solid var(--border); }

    /* ===== STATS ===== */
    .stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:var(--space-4); }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:var(--space-4); transition:transform var(--transition),border-color var(--transition),box-shadow var(--transition); animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both; }
    .stat-card:nth-child(1){animation-delay:.1s}.stat-card:nth-child(2){animation-delay:.15s}.stat-card:nth-child(3){animation-delay:.2s}.stat-card:nth-child(4){animation-delay:.25s}
    .stat-card:hover { transform:translateY(-3px); border-color:var(--primary); box-shadow:0 0 0 1px var(--primary-bg),var(--shadow); }
    .stat-value { font-family:'Space Grotesk',sans-serif; font-size:var(--text-xl); font-weight:700; color:var(--primary); transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    .stat-card:hover .stat-value { transform:scale(1.08); }
    .stat-label { font-size:var(--text-xs); color:var(--text-muted); margin-top:var(--space-1); }

    /* ===== TRENDING ===== */
    .trending-section { display:flex; flex-direction:column; gap:var(--space-4); }
    .section-heading { display:flex; align-items:center; gap:var(--space-2); font-size:var(--text-sm); font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; }
    .section-heading-icon { color:var(--primary); }
    .trending-scroll { display:flex; gap:var(--space-3); overflow-x:auto; padding-bottom:var(--space-2); scrollbar-width:thin; scrollbar-color:var(--surface-3) transparent; }
    .trending-scroll::-webkit-scrollbar{height:4px}.trending-scroll::-webkit-scrollbar-track{background:transparent}.trending-scroll::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:4px}
    .trending-card { flex-shrink:0; width:135px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; cursor:pointer; transition:transform var(--transition),border-color var(--transition),box-shadow var(--transition); }
    .trending-card:hover { transform:translateY(-6px) scale(1.02); border-color:var(--primary); box-shadow:0 10px 28px rgba(124,106,247,0.25); }
    .trending-cover-wrap { overflow:hidden; }
    .trending-cover { width:100%; aspect-ratio:2/3; object-fit:cover; background:var(--surface-3); transition:transform 0.4s ease; }
    .trending-card:hover .trending-cover { transform:scale(1.05); }
    .trending-info { padding:var(--space-2); }
    .trending-title { font-size:var(--text-xs); font-weight:600; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .trending-score { font-size:var(--text-xs); color:var(--gold); font-weight:700; margin-top:3px; }
    .trending-add { width:100%; margin-top:var(--space-2); padding:var(--space-1) 0; background:var(--primary-bg); color:var(--primary); border-radius:var(--radius-sm); font-size:var(--text-xs); font-weight:700; }
    .trending-add:hover { background:var(--primary); color:#fff; }
    .trending-add.added { background:rgba(52,211,153,0.15); color:var(--green); pointer-events:none; }
    .skeleton { background:linear-gradient(90deg,var(--surface-2) 25%,var(--surface-3) 50%,var(--surface-2) 75%); background-size:200% 100%; animation:shimmer 1.5s ease-in-out infinite; }
    .sk-cover { width:135px; height:202px; border-radius:var(--radius-lg) var(--radius-lg) 0 0; }
    .sk-text { height:10px; margin:var(--space-2); border-radius:4px; }
    .sk-text.short { width:60%; }

    /* ===== FILTERS ===== */
    .filters { display:flex; gap:var(--space-2); flex-wrap:wrap; }
    .filter-btn { padding:var(--space-1) var(--space-4); border-radius:var(--radius-full); border:1px solid var(--border); font-size:var(--text-sm); font-weight:500; color:var(--text-muted); background:var(--surface); }
    .filter-btn:hover { border-color:var(--primary); color:var(--primary); transform:translateY(-1px); }
    .filter-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); box-shadow:0 4px 14px var(--primary-glow); }

    /* ===== ANIME GRID ===== */
    .anime-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(min(200px,100%),1fr)); gap:var(--space-4); }
    .anime-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; display:flex; flex-direction:column; position:relative; transition:transform var(--transition),border-color var(--transition),box-shadow var(--transition); animation:cardEntrance 0.4s cubic-bezier(0.16,1,0.3,1) both; }
    .anime-card:hover { border-color:var(--primary); box-shadow:0 0 0 1px var(--primary-bg),var(--shadow); transform:translateY(-4px); }
    .anime-cover-wrap { position:relative; cursor:pointer; overflow:hidden; }
    .anime-cover { width:100%; aspect-ratio:2/3; object-fit:cover; background:var(--surface-3); display:block; transition:transform 0.4s ease; }
    .anime-cover-wrap:hover .anime-cover { transform:scale(1.07); }
    .anime-cover-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0) 55%); opacity:0; display:flex; align-items:center; justify-content:center; transition:opacity var(--transition); }
    .anime-cover-wrap:hover .anime-cover-overlay { opacity:1; }
    .cover-play-btn { width:44px; height:44px; border-radius:var(--radius-full); background:rgba(255,255,255,0.92); color:#111; display:flex; align-items:center; justify-content:center; transform:scale(0.78); transition:transform var(--transition); }
    .anime-cover-wrap:hover .cover-play-btn { transform:scale(1); }
    .anime-card-body { padding:var(--space-3); flex:1; display:flex; flex-direction:column; gap:var(--space-2); }
    .anime-card-title { font-weight:600; font-size:var(--text-sm); line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .status-badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:var(--radius-full); font-size:var(--text-xs); font-weight:600; }
    .status-watching{background:rgba(124,106,247,0.15);color:var(--primary)}
    .status-completed{background:rgba(52,211,153,0.15);color:var(--green)}
    .status-planned{background:rgba(245,158,11,0.15);color:var(--gold)}
    .status-dropped{background:rgba(248,113,113,0.15);color:var(--red)}
    .status-catchup{background:rgba(96,165,250,0.15);color:var(--blue)}
    .episode-row { display:flex; align-items:center; gap:var(--space-2); margin-top:auto; }
    .ep-btn { width:28px; height:28px; border-radius:var(--radius-sm); background:var(--surface-2); color:var(--text); display:flex; align-items:center; justify-content:center; font-size:1rem; font-weight:700; flex-shrink:0; }
    .ep-btn:hover { background:var(--primary); color:#fff; transform:scale(0.94); }
    .ep-input { flex:1; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:var(--space-1) var(--space-2); font-size:var(--text-sm); text-align:center; color:var(--text); }
    .ep-input:focus { outline:none; border-color:var(--primary); }
    .ep-total { font-size:var(--text-xs); color:var(--text-faint); white-space:nowrap; }
    .progress-bar-wrap { height:4px; background:var(--surface-3); border-radius:2px; overflow:hidden; }
    .progress-bar { height:100%; background:linear-gradient(90deg,var(--primary),var(--primary-hover)); border-radius:2px; transition:width 0.5s cubic-bezier(0.16,1,0.3,1); position:relative; }
    .progress-bar::after { content:''; position:absolute; top:0; right:0; bottom:0; width:20px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3)); animation:progressShine 2s ease-in-out infinite; }
    .status-select { width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:var(--space-1) var(--space-2); font-size:var(--text-xs); color:var(--text); cursor:pointer; }
    .status-select:focus { outline:none; border-color:var(--primary); }
    .card-delete { position:absolute; top:var(--space-2); right:var(--space-2); width:28px; height:28px; background:rgba(0,0,0,0.65); color:var(--red); border-radius:var(--radius-sm); display:none; align-items:center; justify-content:center; font-size:0.8rem; z-index:2; }
    .anime-card:hover .card-delete { display:flex; }
    .card-delete:hover { background:var(--red); color:#fff; transform:scale(1.1); }
    .card-note-preview { font-size:var(--text-xs); color:var(--text-muted); font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-rating-preview { display:flex; gap:1px; margin-top:2px; }
    .card-star-preview { font-size:0.65rem; }

    /* ===== EMPTY STATE ===== */
    .empty-state { display:flex; flex-direction:column; align-items:center; text-align:center; padding:var(--space-12) var(--space-8); color:var(--text-muted); gap:var(--space-4); grid-column:1/-1; animation:fadeUp 0.4s ease; }
    .empty-state svg { color:var(--text-faint); animation:floatIcon 3s ease-in-out infinite; }
    .empty-state h3 { color:var(--text); font-size:var(--text-lg); }
    .empty-state p { max-width:36ch; font-size:var(--text-sm); }

    /* ===== TOAST ===== */
    .toast-container { position:fixed; bottom:var(--space-6); right:var(--space-6); display:flex; flex-direction:column; gap:var(--space-2); z-index:900; }
    .toast { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:var(--space-3) var(--space-4); font-size:var(--text-sm); box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:var(--space-2); animation:toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }
    .toast.out { animation:toastOut 0.25s ease forwards; }
    .toast.success{border-left:3px solid var(--green)}
    .toast.error{border-left:3px solid var(--red)}
    .toast.info{border-left:3px solid var(--primary)}

    /* ===== MODAL ===== */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.82); backdrop-filter:blur(6px); z-index:500; display:flex; align-items:center; justify-content:center; padding:var(--space-4); opacity:0; pointer-events:none; transition:opacity 0.3s ease; }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-2xl); width:100%; max-width:780px; max-height:92dvh; overflow-y:auto; box-shadow:var(--shadow-lg); transform:translateY(28px) scale(0.97); transition:transform 0.3s cubic-bezier(0.16,1,0.3,1); scrollbar-width:thin; scrollbar-color:var(--surface-3) transparent; }
    .modal-overlay.open .modal { transform:translateY(0) scale(1); }
    .modal-hero { position:relative; width:100%; height:250px; overflow:hidden; flex-shrink:0; }
    .modal-banner { width:100%; height:100%; object-fit:cover; filter:blur(4px) brightness(0.3) saturate(1.3); transform:scale(1.1); transition:transform 7s ease; }
    .modal-overlay.open .modal-banner { transform:scale(1); }
    .modal-cover { position:absolute; left:var(--space-6); bottom:-48px; width:112px; border-radius:var(--radius-md); box-shadow:0 14px 36px rgba(0,0,0,0.75); border:3px solid var(--surface); animation:coverSlideUp 0.4s 0.2s cubic-bezier(0.34,1.56,0.64,1) both; }
    .modal-close { position:absolute; top:var(--space-3); right:var(--space-3); width:36px; height:36px; background:rgba(0,0,0,0.55); color:#fff; border-radius:var(--radius-full); display:flex; align-items:center; justify-content:center; font-size:1rem; z-index:2; backdrop-filter:blur(4px); }
    .modal-close:hover { background:rgba(255,255,255,0.2); transform:scale(1.1); }
    .modal-body { padding:var(--space-6); padding-top:calc(var(--space-6) + 48px); display:flex; flex-direction:column; gap:var(--space-5); }
    .modal-title-row { display:flex; align-items:flex-start; justify-content:space-between; gap:var(--space-4); flex-wrap:wrap; }
    .modal-title { font-family:'Space Grotesk',sans-serif; font-size:var(--text-lg); font-weight:700; line-height:1.2; }
    .modal-native { font-size:var(--text-sm); color:var(--text-muted); margin-top:3px; }
    .modal-meta-row { display:flex; flex-wrap:wrap; gap:var(--space-2); align-items:center; }
    .modal-chip { padding:3px 10px; border-radius:var(--radius-full); font-size:var(--text-xs); font-weight:600; background:var(--surface-2); color:var(--text-muted); border:1px solid var(--border); }
    .modal-chip.score{background:rgba(245,158,11,0.12);color:var(--gold);border-color:transparent}
    .modal-chip.airing{background:rgba(52,211,153,0.12);color:var(--green);border-color:transparent}
    .modal-chip.finished{background:var(--primary-bg);color:var(--primary);border-color:transparent}
    .modal-chip.not-started{background:rgba(248,113,113,0.1);color:var(--red);border-color:transparent}
    .modal-section-title { font-size:var(--text-xs); font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-faint); margin-bottom:var(--space-2); display:flex; align-items:center; gap:var(--space-2); }
    .modal-section-title::after { content:''; flex:1; height:1px; background:var(--border); }
    .modal-synopsis { font-size:var(--text-sm); color:var(--text-muted); line-height:1.8; }
    .modal-genres { display:flex; flex-wrap:wrap; gap:var(--space-2); }
    .modal-genre { padding:3px 12px; border-radius:var(--radius-full); font-size:var(--text-xs); font-weight:600; background:var(--primary-bg); color:var(--primary); cursor:default; transition:background var(--transition),transform var(--transition); }
    .modal-genre:hover { background:var(--primary); color:#fff; transform:scale(0.95); }
    .modal-stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:var(--space-3); }
    .modal-stat { background:var(--surface-2); border-radius:var(--radius-md); padding:var(--space-3); border:1px solid var(--border); transition:border-color var(--transition); }
    .modal-stat:hover { border-color:var(--border-hover); }
    .modal-stat-val { font-weight:700; font-size:var(--text-sm); color:var(--text); }
    .modal-stat-lbl { font-size:var(--text-xs); color:var(--text-muted); margin-top:2px; }

    /* ===== PROGRESS SECTION (modal) ===== */
    .modal-progress-section { background:var(--surface-2); border-radius:var(--radius-lg); border:1px solid var(--border); padding:var(--space-5); display:flex; flex-direction:column; gap:var(--space-4); }
    .modal-ep-row { display:flex; align-items:center; gap:var(--space-3); flex-wrap:wrap; }
    .modal-ep-label { font-size:var(--text-sm); color:var(--text-muted); font-weight:500; white-space:nowrap; }
    .modal-ep-input { width:70px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:var(--space-2) var(--space-3); font-size:var(--text-sm); font-weight:700; text-align:center; color:var(--text); }
    .modal-ep-input:focus { outline:none; border-color:var(--primary); }
    .modal-ep-sep { color:var(--text-faint); font-size:var(--text-sm); }
    .modal-ep-total { font-size:var(--text-sm); color:var(--text-faint); }
    .modal-ep-btns { display:flex; gap:var(--space-2); }
    .modal-ep-btn { padding:var(--space-2) var(--space-3); background:var(--surface-3); border-radius:var(--radius-sm); font-size:var(--text-sm); font-weight:600; color:var(--text-muted); }
    .modal-ep-btn:hover { background:var(--primary); color:#fff; }
    .modal-status-select { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:var(--space-2) var(--space-3); font-size:var(--text-sm); color:var(--text); cursor:pointer; min-width:160px; }
    .modal-status-select:focus { outline:none; border-color:var(--primary); }

    /* ===== RATING /10 ===== */
    .rating-row { display:flex; align-items:center; gap:var(--space-3); flex-wrap:wrap; }
    .rating-label { font-size:var(--text-sm); color:var(--text-muted); font-weight:500; }
    .rating-stars { display:flex; gap:3px; }
    .rating-star { font-size:1.35rem; cursor:pointer; transition:transform var(--transition),filter var(--transition); filter:grayscale(1) opacity(0.35); user-select:none; }
    .rating-star.active { filter:none; animation:starPop 0.25s ease; }
    .rating-star:hover,
    .rating-star.hovered { transform:scale(1.2); filter:none; }
    .rating-val { font-family:'Space Grotesk',sans-serif; font-size:var(--text-sm); font-weight:700; color:var(--gold); min-width:28px; }

    /* ===== COMMENT ===== */
    .comment-wrap { display:flex; flex-direction:column; gap:var(--space-2); }
    .comment-textarea { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:var(--space-3); font-size:var(--text-sm); color:var(--text); resize:vertical; min-height:88px; line-height:1.6; }
    .comment-textarea::placeholder { color:var(--text-faint); }
    .comment-textarea:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-bg); }
    .comment-save-btn { align-self:flex-end; padding:var(--space-2) var(--space-5); background:var(--primary); color:#fff; border-radius:var(--radius-full); font-size:var(--text-sm); font-weight:600; box-shadow:0 4px 14px var(--primary-glow); transition:background var(--transition),transform var(--transition),box-shadow var(--transition); position:relative; overflow:hidden; }
    .comment-save-btn:hover { background:var(--primary-hover); transform:translateY(-1px); box-shadow:0 6px 20px var(--primary-glow); }
    .comment-save-btn:active { transform:scale(0.97); }
    .btn-ripple { position:absolute; border-radius:50%; background:rgba(255,255,255,0.35); animation:ripple 0.5s ease-out forwards; pointer-events:none; }

    /* ===== ADD BUTTON ===== */
    .modal-add-btn { width:100%; padding:var(--space-3) var(--space-6); background:var(--primary); color:#fff; border-radius:var(--radius-lg); font-size:var(--text-sm); font-weight:700; display:flex; align-items:center; justify-content:center; gap:var(--space-2); box-shadow:0 4px 18px var(--primary-glow); transition:background var(--transition),transform var(--transition),box-shadow var(--transition); }
    .modal-add-btn:hover { background:var(--primary-hover); transform:translateY(-2px); box-shadow:0 8px 24px var(--primary-glow); }
    .modal-add-btn:active { transform:scale(0.98); }

    /* ===== CONFETTI ===== */
    .confetti-piece { position:fixed; width:8px; height:14px; border-radius:2px; pointer-events:none; z-index:9999; animation:confettiFall linear forwards; }
  </style>
</head>

<script>
const STORAGE_KEY = 'anitrack_v3';
const JIKAN = 'https://api.jikan.moe/v4';
const ANILIST = 'https://graphql.anilist.co';
const KITSU = 'https://kitsu.app/api/edge';

let animeList = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let currentFilter = 'all';
let currentSort = 'recent';
let currentView = 'library';
let trendingCache = null;
let seasonalCache = null;
let recommendationCache = {};
let detailsCache = {};
let searchTimer = null;
let currentModal = null;
let isDark = document.documentElement.getAttribute('data-theme') === 'dark';

const GENRES_FR = {
  'Action':'Action','Adventure':'Aventure','Comedy':'Comédie','Drama':'Drame',
  'Ecchi':'Ecchi','Fantasy':'Fantasy','Horror':'Horreur','Mahou Shoujo':'Mahou Shoujo',
  'Mecha':'Mecha','Music':'Musique','Mystery':'Mystère','Psychologique':'Psychologique',
  'Psychological':'Psychologique','Romance':'Romance','Sci-Fi':'Science-Fiction',
  'Slice of Life':'Tranche de vie','Sports':'Sport','Supernatural':'Surnaturel',
  'Thriller':'Thriller','Shounen':'Shounen','Shoujo':'Shoujo','Seinen':'Seinen','Josei':'Josei'
};

const STATUS_LABELS = {
  watching: 'En cours',
  completed: 'Terminé',
  planned: 'À voir',
  dropped: 'Abandonné',
  paused: 'En pause'
};

const STATUS_COLORS = {
  watching: 'status-watching',
  completed: 'status-completed',
  planned: 'status-planned',
  dropped: 'status-dropped',
  paused: 'status-catchup'
};

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(animeList));
}

function safeText(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function statusLabel(status) {
  return STATUS_LABELS[status] || status;
}

function getCurrentSeason() {
  const month = new Date().getMonth() + 1;
  if (month <= 3) return 'WINTER';
  if (month <= 6) return 'SPRING';
  if (month <= 9) return 'SUMMER';
  return 'FALL';
}

function getCurrentYear() {
  return new Date().getFullYear();
}

async function anilistFetch(query, variables = {}) {
  const res = await fetch(ANILIST, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify({ query, variables })
  });
  if (!res.ok) throw new Error('Erreur AniList ' + res.status);
  const json = await res.json();
  if (json.errors) throw new Error(json.errors[0]?.message || 'Erreur GraphQL');
  return json.data;
}

const jikanQueue = [];
let jikanBusy = false;

function jikanFetch(url) {
  return new Promise((resolve, reject) => {
    jikanQueue.push({ url, resolve, reject });
    processJikanQueue();
  });
}

async function processJikanQueue() {
  if (jikanBusy || !jikanQueue.length) return;
  jikanBusy = true;
  const { url, resolve, reject } = jikanQueue.shift();
  try {
    const r = await fetch(url);
    if (r.status === 429) {
      jikanQueue.unshift({ url, resolve, reject });
      setTimeout(() => { jikanBusy = false; processJikanQueue(); }, 1200);
      return;
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    resolve(await r.json());
    } catch (e) {
    reject(e);
    setTimeout(() => { jikanBusy = false; processJikanQueue(); }, 350);
    return;
  }
  setTimeout(() => { jikanBusy = false; processJikanQueue(); }, 350);
}

function normalizeJikan(a) {
  return {
    id: a.mal_id,
    malId: a.mal_id,
    anilistId: null,
    title: a.title_french || a.title_english || a.title,
    titleRomaji: a.title || '',
    titleNative: a.title_japanese || '',
    cover: a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || '',
    banner: a.trailer?.images?.maximum_image_url || a.images?.jpg?.large_image_url || '',
    totalEps: a.episodes || null,
    currentEp: 0,
    score: a.score ? Number(a.score.toFixed(1)) : null,
    averageScore: a.score ? Math.round(a.score * 10) : null,
    popularity: a.popularity || 0,
    format: a.type || '?',
    year: a.year || a.aired?.prop?.from?.year || null,
    season: a.season || '',
    genres: (a.genres || []).map(g => g.name),
    synopsis: (a.synopsis || '').replace(/<[^>]+>/g, '').trim(),
    studio: (a.studios || [])[0]?.name || '?',
    source: a.source || '?',
    duration: a.duration || '?',
    trailerUrl: a.trailer?.url || '',
    trailerYoutubeId: a.trailer?.youtube_id || '',
    statusApi: a.status || '?',
    userStatus: 'planned',
    rating: 0,
    note: '',
    favorite: false,
    addedAt: Date.now(),
    updatedAt: Date.now()
  };
}

function normalizeAniList(media) {
  return {
    id: media.idMal || media.id,
    malId: media.idMal || null,
    anilistId: media.id,
    title: media.title?.english || media.title?.romaji || 'Inconnu',
    titleRomaji: media.title?.romaji || '',
    titleNative: media.title?.native || '',
    cover: media.coverImage?.extraLarge || media.coverImage?.large || '',
    banner: media.bannerImage || media.coverImage?.extraLarge || '',
    totalEps: media.episodes || null,
    currentEp: 0,
    score: media.averageScore ? Number((media.averageScore / 10).toFixed(1)) : null,
    averageScore: media.averageScore || null,
    popularity: media.popularity || 0,
    format: media.format || '?',
    year: media.seasonYear || media.startDate?.year || null,
    season: media.season || '',
    genres: media.genres || [],
    synopsis: (media.description || '').replace(/<[^>]+>/g, '').trim(),
    studio: media.studios?.nodes?.[0]?.name || '?',
    source: media.source || '?',
    duration: media.duration ? `${media.duration} min` : '?',
    trailerUrl: media.trailer?.site === 'youtube' && media.trailer?.id ? `https://www.youtube.com/watch?v=${media.trailer.id}` : '',
    trailerYoutubeId: media.trailer?.site === 'youtube' ? media.trailer?.id || '' : '',
    statusApi: media.status || '?',
    userStatus: 'planned',
    rating: 0,
    note: '',
    favorite: false,
    addedAt: Date.now(),
    updatedAt: Date.now(),
    recommendations: (media.recommendations?.nodes || [])
      .map(n => n.mediaRecommendation)
      .filter(Boolean)
      .map(r => ({
        id: r.idMal || r.id,
        anilistId: r.id,
        title: r.title?.english || r.title?.romaji || 'Inconnu',
        cover: r.coverImage?.large || '',
        score: r.averageScore ? Number((r.averageScore / 10).toFixed(1)) : null
      }))
  };
}

async function searchJikan(term) {
  const d = await jikanFetch(`${JIKAN}/anime?q=${encodeURIComponent(term)}&limit=8&sfw=false`);
  return (d.data || []).map(normalizeJikan);
}

async function searchAniList(term) {
  const query = `
    query ($search: String) {
      Page(page: 1, perPage: 8) {
        media(search: $search, type: ANIME, sort: SEARCH_MATCH) {
          id
          idMal
          title { romaji english native }
          coverImage { large extraLarge }
          bannerImage
          episodes
          averageScore
          popularity
          format
          season
          seasonYear
          genres
          description(asHtml: false)
          duration
          source
          status
          studios(isMain: true) { nodes { name } }
          trailer { id site }
        }
      }
    }
  `;
  const data = await anilistFetch(query, { search: term });
  return (data.Page?.media || []).map(normalizeAniList);
}

async function fetchTrending() {
  if (trendingCache) return trendingCache;
  const d = await jikanFetch(`${JIKAN}/top/anime?filter=airing&limit=12`);
  trendingCache = (d.data || []).map(normalizeJikan);
  return trendingCache;
}

async function fetchSeasonal() {
  if (seasonalCache) return seasonalCache;
  const query = `
    query ($season: MediaSeason, $seasonYear: Int) {
      Page(page: 1, perPage: 12) {
        media(season: $season, seasonYear: $seasonYear, type: ANIME, sort: POPULARITY_DESC) {
          id
          idMal
          title { romaji english native }
          coverImage { large extraLarge }
          bannerImage
          episodes
          averageScore
          popularity
          format
          season
          seasonYear
          genres
          description(asHtml: false)
          duration
          source
          status
          studios(isMain: true) { nodes { name } }
          trailer { id site }
        }
      }
    }
  `;
  const data = await anilistFetch(query, {
    season: getCurrentSeason(),
    seasonYear: getCurrentYear()
  });
  seasonalCache = (data.Page?.media || []).map(normalizeAniList);
  return seasonalCache;
}

async function fetchAnimeDetails(id) {
  const query = `
    query ($idMal: Int, $id: Int) {
      Media(idMal: $idMal, id: $id, type: ANIME) {
        id
        idMal
        title { romaji english native }
        coverImage { large extraLarge }
        bannerImage
        episodes
        averageScore
        popularity
        favourites
        format
        season
        seasonYear
        genres
        description(asHtml: false)
        duration
        source
        status
        siteUrl
        nextAiringEpisode { episode timeUntilAiring }
        trailer { id site }
        studios(isMain: true) { nodes { name } }
        recommendations(page: 1, perPage: 6, sort: RATING_DESC) {
          nodes {
            mediaRecommendation {
              id
              idMal
              title { romaji english native }
              coverImage { large }
              averageScore
            }
          }
        }
      }
    }
  `;
    const numericId = Number(id);
  if (detailsCache[numericId]) return detailsCache[numericId];
  const local = animeList.find(x => x.id === numericId || x.malId === numericId);
  const variables = local?.anilistId
    ? { id: local.anilistId }
    : { idMal: numericId };
  const data = await anilistFetch(query, variables);
  if (!data.Media) throw new Error('Anime introuvable');
  const result = normalizeAniList(data.Media);
  detailsCache[numericId] = result;
  return result;
}
async function fetchSynopsisFR(malId) {
  try {
    const r = await fetch(`${KITSU}/anime?filter[malId]=${malId}&fields[anime]=synopsis`);
    if (!r.ok) return null;
    const json = await r.json();
    const synopsis = json.data?.[0]?.attributes?.synopsis;
    return synopsis && synopsis.length > 20 ? synopsis : null;
  } catch {
    return null;
  }
}
async function translateToFR(text) {
  if (!text || text.length < 10) return text;
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text.slice(0, 500))}&langpair=en|fr`;
    const r = await fetch(url);
    const json = await r.json();
    if (json.responseStatus === 200) return json.responseData.translatedText;
    return text;
  } catch {
    return text;
  }
}
function mergeSearchResults(local, jikan, anilist) {
  const map = new Map();
  [...local, ...jikan, ...anilist].forEach(item => {
    const key = item.anilistId ? `al_${item.anilistId}` : `mal_${item.malId || item.id}`;
    if (!map.has(key)) map.set(key, item);
    else {
      map.set(key, { ...map.get(key), ...item });
    }
  });
  return [...map.values()];
}

  const entry = {

    malId: apiAnime.malId || apiAnime.id,

    title: apiAnime.title || 'Inconnu',
    titleRomaji: apiAnime.titleRomaji || '',
    titleNative: apiAnime.titleNative || '',
    cover: apiAnime.cover || '',
    banner: apiAnime.banner || '',
    totalEps: apiAnime.totalEps || null,
    currentEp: 0,
    userStatus: 'planned',
    rating: 0,
    note: '',
    favorite: false,
    score: apiAnime.score || null,
    averageScore: apiAnime.averageScore || null,
    popularity: apiAnime.popularity || 0,
    format: apiAnime.format || '?',
    year: apiAnime.year || null,
    season: apiAnime.season || '',
    genres: apiAnime.genres || [],

function updateEntry(id, patch) {
  const i = animeList.findIndex(x => x.id === id);
  if (i === -1) return;
  animeList[i] = { ...animeList[i], ...patch, updatedAt: Date.now() };
  save();
  renderGrid();
  updateStats();
  updateBadges();
}

function removeFromList(id) {
  const anime = animeList.find(x => x.id === id);
  animeList = animeList.filter(x => x.id !== id);
  save();
  renderGrid();
  updateStats();
  updateBadges();
  if (anime) toast('info', `« ${anime.title} » retiré de ta liste.`);
}

function toggleFavorite(id) {
  const anime = animeList.find(x => x.id === id);
  if (!anime) return;
  updateEntry(id, { favorite: !anime.favorite });
}

function changeStatus(id, value) {
  updateEntry(id, { userStatus: value });
}

function changeEp(id, delta) {
  const anime = animeList.find(x => x.id === id);
  if (!anime) return;
  const max = anime.totalEps || 9999;
  const newEp = Math.max(0, Math.min(max, anime.currentEp + delta));
  const patch = { currentEp: newEp };
  if (anime.totalEps && newEp >= anime.totalEps) patch.userStatus = 'completed';
  else if (newEp > 0 && anime.userStatus === 'planned') patch.userStatus = 'watching';
  updateEntry(id, patch);
}

function changeEpDirect(id, value) {
  const anime = animeList.find(x => x.id === id);
  if (!anime) return;
  const max = anime.totalEps || 9999;
  const newEp = Math.max(0, Math.min(max, parseInt(value || 0, 10)));
  const patch = { currentEp: newEp };
  if (anime.totalEps && newEp >= anime.totalEps) patch.userStatus = 'completed';
  updateEntry(id, patch);
}

function setRating(id, value) {
  updateEntry(id, { rating: value });
}

function saveComment(id) {
  const txt = document.getElementById('commentArea')?.value || '';
  updateEntry(id, { note: txt });
  toast('success', 'Avis sauvegardé.');
}

function updateStats() {
  const total = animeList.length;
  const eps = animeList.reduce((s, a) => s + (a.currentEp || 0), 0);
  const rated = animeList.filter(a => a.rating > 0);
  const avg = rated.length ? (rated.reduce((s, a) => s + a.rating, 0) / rated.length).toFixed(1) : '—';
  const completed = animeList.filter(a => a.userStatus === 'completed').length;

  const statTotal = document.getElementById('statTotal');
  const statEps = document.getElementById('statEps');
  const statRating = document.getElementById('statRating');
  const statCompleted = document.getElementById('statCompleted');
  if (statTotal) statTotal.textContent = total;
  if (statEps) statEps.textContent = eps;
  if (statRating) statRating.textContent = avg;
  if (statCompleted) statCompleted.textContent = completed;
}

function updateBadges() {
  const counts = {
    all: animeList.length,
    watching: animeList.filter(a => a.userStatus === 'watching').length,
    completed: animeList.filter(a => a.userStatus === 'completed').length,
    planned: animeList.filter(a => a.userStatus === 'planned').length,
    dropped: animeList.filter(a => a.userStatus === 'dropped').length
  };
  Object.entries(counts).forEach(([key, value]) => {
    const el = document.getElementById(`badge-${key}`);
    if (el) el.textContent = value;
  });
}

function getFilteredList() {
  let list = [...animeList];
  if (currentFilter === 'favorites') list = list.filter(a => a.favorite);
  else if (currentFilter !== 'all') list = list.filter(a => a.userStatus === currentFilter);

  switch (currentSort) {
    case 'title':
      list.sort((a, b) => (a.title || '').localeCompare(b.title || '', 'fr'));
      break;
    case 'rating':
      list.sort((a, b) => (b.rating || 0) - (a.rating || 0));
      break;
    case 'score':
      list.sort((a, b) => (b.score || 0) - (a.score || 0));
      break;
    case 'progress':
      list.sort((a, b) => (b.currentEp || 0) - (a.currentEp || 0));
      break;
    case 'year':
      list.sort((a, b) => (b.year || 0) - (a.year || 0));
      break;
    default:
      list.sort((a, b) => (b.updatedAt || b.addedAt || 0) - (a.updatedAt || a.addedAt || 0));
  }
  return list;
}

async function performSearch(term) {
  const box = document.getElementById('searchResults');
  box.innerHTML = '<div class="search-loading"><span class="search-spinner"></span>Recherche multi-source...</div>';
  box.classList.add('open');

  try {
    const local = animeList.filter(a =>
      (a.title || '').toLowerCase().includes(term.toLowerCase()) ||
      (a.titleRomaji || '').toLowerCase().includes(term.toLowerCase())
    );
    const [jikan, anilist] = await Promise.all([
      searchJikan(term),
      searchAniList(term)
    ]);
    const merged = mergeSearchResults(local, jikan, anilist);
    box.innerHTML = '';

    if (!merged.length) {
      box.innerHTML = `<div class="search-empty">Aucun résultat pour "${safeText(term)}"</div>`;
      return;
    }

    if (local.length) box.insertAdjacentHTML('beforeend', `<div class="search-section-header">📚 Déjà dans ma liste</div>`);
    local.forEach(a => box.appendChild(buildSearchItem(a, true)));

    const externals = merged.filter(a => !local.find(l => l.id === a.id));
    if (externals.length) box.insertAdjacentHTML('beforeend', `<div class="search-section-header">🌐 Résultats API</div>`);
    externals.forEach(a => box.appendChild(buildSearchItem(a, false)));
  } catch (e) {
    box.innerHTML = `<div class="search-empty">Erreur pendant la recherche : ${safeText(e.message)}</div>`;
  }
}

function buildSearchItem(a, inLibrary) {
  const div = document.createElement('div');
  div.className = 'search-result-item';
  div.innerHTML = `
    <img class="search-result-img" src="${safeText(a.cover)}" alt="${safeText(a.title)}" loading="lazy">
    <div class="search-result-info">
      <div class="search-result-title">${safeText(a.title)}</div>
      <div class="search-result-meta">${safeText(a.format || '?')} · ${a.totalEps || '?'} ép. · ${a.year || '?'}</div>
    </div>
    <button class="search-add-btn ${inLibrary ? 'added' : ''}">
      ${inLibrary ? '✓ Ajouté' : '+ Ajouter'}
    </button>
  `;
  div.querySelector('.search-result-info').addEventListener('click', () => openModalById(a.id));
  div.querySelector('.search-result-img').addEventListener('click', () => openModalById(a.id));

  const btn = div.querySelector('.search-add-btn');
  if (!inLibrary) {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      addToList(a);
      btn.textContent = '✓ Ajouté';
      btn.classList.add('added');
    });
  }
  return div;
}

        ${local.favorite ? 'Retirer des favoris' : 'Ajouter aux favoris'}
      </button>
      <button onclick="removeFromList(${local.id}); closeModal()" style="color:var(--red);font-size:var(--text-sm)">
        Retirer de ma liste
      </button>
    </div>
  `;
}

function closeModal() {
  document.getElementById('modalOverlay')?.classList.remove('open');
}

function handleModalClick(e) {
  if (e.target.id === 'modalOverlay') closeModal();
}

function toast(type, msg) {
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  const c = document.getElementById('toastContainer');
  if (!c) return;
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = `<span>${icons[type] || 'ℹ'}</span><span>${safeText(msg)}</span>`;
  c.appendChild(t);
  setTimeout(() => {
    t.classList.add('out');
    setTimeout(() => t.remove(), 300);
  }, 2800);
}

function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
}

function exportData() {
  const blob = new Blob([JSON.stringify(animeList, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'anitrack-backup.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error('Format invalide');
      animeList = imported;
      save();
      renderGrid();
      updateStats();
      updateBadges();
      toast('success', 'Sauvegarde importée.');
    } catch (err) {
      toast('error', 'Import impossible.');
    }
  };
  reader.readAsText(file);
}

function bindSearch() {
  const input = document.getElementById('searchInput');
  const clear = document.getElementById('searchClear');
  const box = document.getElementById('searchResults');
  if (!input || !clear || !box) return;

  input.addEventListener('input', function () {
    const val = this.value.trim();
    clear.classList.toggle('visible', val.length > 0);
    clearTimeout(searchTimer);
    if (!val) {
      box.classList.remove('open');
      box.innerHTML = '';
      return;
    }
    searchTimer = setTimeout(() => performSearch(val), 350);
  });

  clear.addEventListener('click', function () {
    input.value = '';
    clear.classList.remove('visible');
    box.classList.remove('open');
    box.innerHTML = '';
  });
}

function injectToolbar() {
  const header = document.querySelector('.page-header');
  if (!header) return;

  const toolbar = document.createElement('div');
  toolbar.style.display = 'flex';
  toolbar.style.flexWrap = 'wrap';
  toolbar.style.gap = '10px';
  toolbar.style.width = '100%';
  toolbar.innerHTML = `
    <select class="status-select" id="sortSelect" style="max-width:220px">
      <option value="recent">Tri : plus récents</option>
      <option value="title">Tri : nom</option>
      <option value="rating">Tri : note perso</option>
      <option value="score">Tri : note globale</option>
      <option value="progress">Tri : progression</option>
      <option value="year">Tri : année</option>
    </select>

    <button class="filter-btn" id="favoritesBtn">💜 Favoris</button>
    <button class="filter-btn" id="seasonBtn">📺 Saison</button>
    <button class="filter-btn" id="exportBtn">⬇ Export</button>
    <label class="filter-btn" style="cursor:pointer">
      ⬆ Import
      <input type="file" id="importInput" accept=".json" hidden>
    </label>
  `;
  header.insertAdjacentElement('afterend', toolbar);

  document.getElementById('sortSelect').addEventListener('change', e => {
    currentSort = e.target.value;
    renderGrid();
  });

  document.getElementById('favoritesBtn').addEventListener('click', () => {
    currentFilter = currentFilter === 'favorites' ? 'all' : 'favorites';
    renderGrid();
  });

  document.getElementById('seasonBtn').addEventListener('click', async () => {
    const items = await fetchSeasonal();
    const grid = document.getElementById('animeGrid');
    grid.innerHTML = items.map(a => `
      <article class="anime-card">
        <div class="anime-cover-wrap" onclick="openModalById(${a.id})">
          <img class="anime-cover" src="${safeText(a.cover)}" alt="${safeText(a.title)}" loading="lazy">
        </div>
        <div class="anime-card-body">
          <div class="anime-card-title">${safeText(a.title)}</div>
          <span class="status-badge status-planned">${safeText(a.format)}</span>
          <div class="card-note-preview">${safeText((a.genres || []).slice(0,2).join(' • '))}</div>
          <button class="search-add-btn ${animeList.find(x => x.id === a.id) ? 'added' : ''}" onclick='addToList(${JSON.stringify(a).replace(/'/g, "&apos;")})'>
            ${animeList.find(x => x.id === a.id) ? '✓ Ajouté' : '+ Ajouter'}
          </button>
        </div>
      </article>
    `).join('');
  });

  document.getElementById('exportBtn').addEventListener('click', exportData);
  document.getElementById('importInput').addEventListener('change', e => {
    const file = e.target.files?.[0];
    if (file) importData(file);
  });
}

function bindExistingFilters() {
  ['all', 'watching', 'completed', 'planned', 'dropped'].forEach(key => {
    document.getElementById(`nav-${key}`)?.addEventListener('click', () => {
      currentFilter = key;
      renderGrid();
    });
    document.getElementById(`filter-${key}`)?.addEventListener('click', () => {
      currentFilter = key;
      renderGrid();
    });
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

bindSearch();
injectToolbar();
bindExistingFilters();
renderGrid();
updateStats();
updateBadges();
loadTrending();
</script>
</body>
</html>
