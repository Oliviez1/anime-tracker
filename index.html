<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
      --space-4: 1rem; --space-6: 1.5rem; --space-8: 2rem; --space-12: 3rem;
      --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-full: 9999px;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    [data-theme="dark"] {
      --bg: #0f0f11;
      --surface: #17171a;
      --surface-2: #1e1e22;
      --surface-3: #26262b;
      --border: rgba(255,255,255,0.08);
      --text: #e8e8ea;
      --text-muted: #8b8b94;
      --text-faint: #4a4a52;
      --primary: #7c6af7;
      --primary-hover: #9585f9;
      --primary-bg: rgba(124,106,247,0.12);
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    [data-theme="light"] {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface-2: #f0f0f3;
      --surface-3: #e8e8ec;
      --border: rgba(0,0,0,0.08);
      --text: #1a1a1f;
      --text-muted: #6b6b74;
      --text-faint: #aaaaB2;
      --primary: #6255e8;
      --primary-hover: #7c6af7;
      --primary-bg: rgba(98,85,232,0.1);
      --shadow: 0 4px 24px rgba(0,0,0,0.1);
    }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body {
      min-height: 100dvh;
      font-family: 'Inter', sans-serif;
      font-size: var(--text-base);
      color: var(--text);
      background: var(--bg);
      transition: background var(--transition), color var(--transition);
    }
    a, button, input, select { font: inherit; color: inherit; transition: all var(--transition); }
    button { cursor: pointer; background: none; border: none; }
    img { display: block; max-width: 100%; }
    :focus-visible { outline: 2px solid var(--primary); outline-offset: 3px; border-radius: var(--radius-sm); }

    /* LAYOUT */
    .app { display: grid; grid-template-columns: 260px 1fr; min-height: 100dvh; }
    @media (max-width: 768px) { .app { grid-template-columns: 1fr; } }

    /* SIDEBAR */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
      position: sticky;
      top: 0;
      height: 100dvh;
      overflow-y: auto;
    }
    @media (max-width: 768px) { .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); } }
    .logo {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      font-weight: 700;
      font-size: var(--text-lg);
      color: var(--text);
      text-decoration: none;
    }
    .logo svg { color: var(--primary); }
    .nav-section-title {
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-faint);
      margin-bottom: var(--space-2);
    }
    .nav-btn {
      width: 100%;
      text-align: left;
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      color: var(--text-muted);
      font-size: var(--text-sm);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: var(--space-2);
      position: relative;
    }
    .nav-btn:hover { background: var(--surface-2); color: var(--text); }
    .nav-btn.active { background: var(--primary-bg); color: var(--primary); }
    .nav-badge {
      margin-left: auto;
      background: var(--surface-3);
      color: var(--text-muted);
      font-size: var(--text-xs);
      padding: 0.1rem 0.4rem;
      border-radius: var(--radius-full);
      font-weight: 600;
    }
    .nav-btn.active .nav-badge { background: var(--primary-bg); color: var(--primary); }
    .sidebar-footer {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .theme-toggle {
      padding: var(--space-2);
      border-radius: var(--radius-md);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .theme-toggle:hover { background: var(--surface-2); color: var(--text); }

    /* MAIN */
    .main { padding: var(--space-8); display: flex; flex-direction: column; gap: var(--space-8); }
    @media (max-width: 768px) { .main { padding: var(--space-4); } }

    /* PAGE HEADER */
    .page-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--space-4); }
    .page-title { font-size: var(--text-xl); font-weight: 700; }
    .page-title span { color: var(--primary); }

    /* SEARCH */
    .search-wrap { position: relative; max-width: 480px; flex: 1; }
    .search-icon {
      position: absolute; left: var(--space-3); top: 50%; transform: translateY(-50%);
      color: var(--text-faint); pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-3) var(--space-3) 2.5rem;
      color: var(--text);
      font-size: var(--text-sm);
    }
    .search-input::placeholder { color: var(--text-faint); }
    .search-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-bg); }
    .search-results {
      position: absolute;
      top: calc(100% + var(--space-2));
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      z-index: 100;
      max-height: 360px;
      overflow-y: auto;
      display: none;
    }
    .search-results.open { display: block; }
    .search-result-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3);
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--surface-2); }
    .search-result-img {
      width: 40px; height: 56px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      background: var(--surface-3);
      flex-shrink: 0;
    }
    .search-result-info { flex: 1; min-width: 0; }
    .search-result-title { font-weight: 600; font-size: var(--text-sm); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .search-result-meta { font-size: var(--text-xs); color: var(--text-muted); margin-top: 2px; }
    .search-add-btn {
      padding: var(--space-1) var(--space-3);
      background: var(--primary-bg);
      color: var(--primary);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .search-add-btn:hover { background: var(--primary); color: #fff; }
    .search-loading, .search-empty {
      padding: var(--space-6);
      text-align: center;
      color: var(--text-muted);
      font-size: var(--text-sm);
    }

    /* FILTERS */
    .filters { display: flex; gap: var(--space-2); flex-wrap: wrap; }
    .filter-btn {
      padding: var(--space-1) var(--space-4);
      border-radius: var(--radius-full);
      border: 1px solid var(--border);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-muted);
      background: var(--surface);
    }
    .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
    .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: var(--space-4); }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
    }
    .stat-value { font-size: var(--text-xl); font-weight: 700; color: var(--primary); }
    .stat-label { font-size: var(--text-xs); color: var(--text-muted); margin-top: var(--space-1); }

    /* ANIME GRID */
    .anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(200px, 100%), 1fr));
      gap: var(--space-4);
    }
    .anime-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .anime-card:hover { border-color: var(--primary); box-shadow: var(--shadow); transform: translateY(-2px); }
    .anime-cover {
      width: 100%; aspect-ratio: 2/3;
      object-fit: cover;
      background: var(--surface-3);
    }
    .anime-card-body { padding: var(--space-3); flex: 1; display: flex; flex-direction: column; gap: var(--space-2); }
    .anime-card-title {
      font-weight: 600;
      font-size: var(--text-sm);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 600;
    }
    .status-watching { background: rgba(124,106,247,0.15); color: var(--primary); }
    .status-completed { background: rgba(52,211,153,0.15); color: #34d399; }
    .status-planned { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .status-dropped { background: rgba(248,113,113,0.15); color: #f87171; }
    .episode-row {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-top: auto;
    }
    .ep-btn {
      width: 28px; height: 28px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .ep-btn:hover { background: var(--primary); color: #fff; }
    .ep-input {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: var(--space-1) var(--space-2);
      font-size: var(--text-sm);
      text-align: center;
      color: var(--text);
      width: 100%;
    }
    .ep-input:focus { outline: none; border-color: var(--primary); }
    .ep-total { font-size: var(--text-xs); color: var(--text-faint); white-space: nowrap; }
    .progress-bar-wrap { height: 3px; background: var(--surface-3); border-radius: 2px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.4s ease; }
    .status-select {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: var(--space-1) var(--space-2);
      font-size: var(--text-xs);
      color: var(--text);
      cursor: pointer;
    }
    .status-select:focus { outline: none; border-color: var(--primary); }
    .card-delete {
      position: absolute;
      top: var(--space-2); right: var(--space-2);
      width: 28px; height: 28px;
      background: rgba(0,0,0,0.6);
      color: #f87171;
      border-radius: var(--radius-sm);
      display: none;
      align-items: center; justify-content: center;
      font-size: 0.85rem;
    }
    .anime-card:hover .card-delete { display: flex; }
    .card-delete:hover { background: #f87171; color: #fff; }

    /* EMPTY STATE */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
      padding: var(--space-12) var(--space-8);
      color: var(--text-muted);
      gap: var(--space-4);
    }
    .empty-state svg { color: var(--text-faint); }
    .empty-state h3 { color: var(--text); font-size: var(--text-lg); }
    .empty-state p { max-width: 36ch; font-size: var(--text-sm); }

    /* TOAST */
    .toast-container {
      position: fixed; bottom: var(--space-6); right: var(--space-6);
      display: flex; flex-direction: column; gap: var(--space-2);
      z-index: 999;
    }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm);
      box-shadow: var(--shadow);
      display: flex; align-items: center; gap: var(--space-2);
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
    .toast.success { border-left: 3px solid #34d399; }
    .toast.error { border-left: 3px solid #f87171; }
    .toast.info { border-left: 3px solid var(--primary); }

    /* VIEW toggle */
    .view { display: none; }
    .view.active { display: contents; }
  </style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <a href="#" class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-label="Anime Tracker logo">
        <rect width="28" height="28" rx="8" fill="currentColor" opacity="0.15"/>
        <path d="M7 21L14 7L21 21" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9.5 16.5H18.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      AniTrack
    </a>

    <nav style="display:flex;flex-direction:column;gap:var(--space-1)">
      <p class="nav-section-title">Ma liste</p>
      <button class="nav-btn active" data-view="all" onclick="switchView('all')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Tous
        <span class="nav-badge" id="badge-all">0</span>
      </button>
      <button class="nav-btn" data-view="watching" onclick="switchView('watching')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16"/></svg>
        En cours
        <span class="nav-badge" id="badge-watching">0</span>
      </button>
      <button class="nav-btn" data-view="completed" onclick="switchView('completed')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20,6 9,17 4,12"/></svg>
        Terminés
        <span class="nav-badge" id="badge-completed">0</span>
      </button>
      <button class="nav-btn" data-view="planned" onclick="switchView('planned')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        À voir
        <span class="nav-badge" id="badge-planned">0</span>
      </button>
      <button class="nav-btn" data-view="dropped" onclick="switchView('dropped')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        Abandonnés
        <span class="nav-badge" id="badge-dropped">0</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <span style="font-size:var(--text-xs);color:var(--text-faint)">Données locales</span>
      <button class="theme-toggle" data-theme-toggle aria-label="Changer le thème">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- HEADER -->
    <div class="page-header">
      <h1 class="page-title">Mon <span>Anime Tracker</span></h1>
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" type="text" id="searchInput" placeholder="Rechercher un anime..." autocomplete="off">
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Total</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-eps">0</div><div class="stat-label">Épisodes vus</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-done">0</div><div class="stat-label">Terminés</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-watching">0</div><div class="stat-label">En cours</div></div>
    </div>

    <!-- FILTERS -->
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Tous</button>
      <button class="filter-btn" data-filter="watching" onclick="setFilter('watching')">En cours</button>
      <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">Terminés</button>
      <button class="filter-btn" data-filter="planned" onclick="setFilter('planned')">À voir</button>
      <button class="filter-btn" data-filter="dropped" onclick="setFilter('dropped')">Abandonnés</button>
    </div>

    <!-- GRID -->
    <div class="anime-grid" id="animeGrid"></div>
  </main>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<script>
// =====================
// STATE
// =====================
let list = JSON.parse(localStorage.getItem('anime-tracker-v2') || '[]');
let currentFilter = 'all';
let searchTimeout = null;

// =====================
// STORAGE
// =====================
function save() {
  localStorage.setItem('anime-tracker-v2', JSON.stringify(list));
}

// =====================
// ANILIST API
// =====================
async function searchAniList(query) {
  const q = `
    query ($search: String) {
      Page(page: 1, perPage: 10) {
        media(search: $search, type: ANIME, sort: SEARCH_MATCH) {
          id title { romaji english native }
          coverImage { large }
          episodes status
          startDate { year }
          format
        }
      }
    }`;
  const res = await fetch('https://graphql.anilist.co', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query: q, variables: { search: query } })
  });
  const data = await res.json();
  return data.data.Page.media;
}

// =====================
// SEARCH UI
// =====================
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  const val = searchInput.value.trim();
  if (!val) { closeSearch(); return; }
  searchResults.innerHTML = '<div class="search-loading">Recherche...</div>';
  searchResults.classList.add('open');
  searchTimeout = setTimeout(async () => {
    try {
      const results = await searchAniList(val);
      if (!results.length) {
        searchResults.innerHTML = '<div class="search-empty">Aucun résultat</div>';
        return;
      }
      searchResults.innerHTML = results.map(a => {
        const title = a.title.english || a.title.romaji;
        const year = a.startDate?.year || '';
        const eps = a.episodes ? `${a.episodes} éps` : 'Ongoing';
        const already = list.find(x => x.id === a.id);
        return `<div class="search-result-item" onclick="addAnime(${JSON.stringify(a).replace(/"/g,'&quot;')})">
          <img class="search-result-img" src="${a.coverImage.large}" alt="${title}" loading="lazy">
          <div class="search-result-info">
            <div class="search-result-title">${title}</div>
            <div class="search-result-meta">${year} · ${eps} · ${a.format || ''}</div>
          </div>
          <button class="search-add-btn" onclick="event.stopPropagation();addAnime(${JSON.stringify(a).replace(/"/g,'&quot;')})">
            ${already ? '✓ Déjà ajouté' : '+ Ajouter'}
          </button>
        </div>`;
      }).join('');
    } catch(e) {
      searchResults.innerHTML = '<div class="search-empty">Erreur de connexion</div>';
    }
  }, 400);
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) closeSearch();
});

function closeSearch() {
  searchResults.classList.remove('open');
  searchResults.innerHTML = '';
}

// =====================
// ADD ANIME
// =====================
function addAnime(anime) {
  if (list.find(x => x.id === anime.id)) {
    toast('Déjà dans ta liste !', 'info');
    closeSearch();
    return;
  }
  list.push({
    id: anime.id,
    title: anime.title.english || anime.title.romaji,
    titleNative: anime.title.native,
    cover: anime.coverImage.large,
    episodes: anime.episodes || null,
    currentEp: 0,
    status: 'watching',
    addedAt: Date.now()
  });
  save();
  render();
  toast(`"${anime.title.english || anime.title.romaji}" ajouté !`, 'success');
  closeSearch();
  searchInput.value = '';
}

// =====================
// DELETE
// =====================
function deleteAnime(id) {
  const anime = list.find(x => x.id === id);
  list = list.filter(x => x.id !== id);
  save();
  render();
  if (anime) toast(`"${anime.title}" retiré`, 'error');
}

// =====================
// UPDATE EPISODE
// =====================
function updateEp(id, val) {
  const item = list.find(x => x.id === id);
  if (!item) return;
  let ep = parseInt(val);
  if (isNaN(ep) || ep < 0) ep = 0;
  if (item.episodes && ep > item.episodes) ep = item.episodes;
  item.currentEp = ep;
  if (item.episodes && ep === item.episodes) item.status = 'completed';
  save();
  renderCard(id);
  updateStats();
  updateBadges();
}

function changeEp(id, delta) {
  const item = list.find(x => x.id === id);
  if (!item) return;
  let ep = item.currentEp + delta;
  if (ep < 0) ep = 0;
  if (item.episodes && ep > item.episodes) ep = item.episodes;
  item.currentEp = ep;
  if (item.episodes && ep === item.episodes) item.status = 'completed';
  save();
  renderCard(id);
  updateStats();
  updateBadges();
}

// =====================
// UPDATE STATUS
// =====================
function updateStatus(id, status) {
  const item = list.find(x => x.id === id);
  if (!item) return;
  item.status = status;
  if (status === 'completed' && item.episodes) item.currentEp = item.episodes;
  save();
  renderCard(id);
  updateStats();
  updateBadges();
}

// =====================
// FILTER
// =====================
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  render();
}

function switchView(v) {
  setFilter(v);
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
}

// =====================
// RENDER CARD
// =====================
function renderCard(id) {
  const item = list.find(x => x.id === id);
  const el = document.getElementById(`card-${id}`);
  if (!el || !item) return;
  const pct = item.episodes ? Math.round((item.currentEp / item.episodes) * 100) : 0;
  const statusLabels = { watching: 'En cours', completed: 'Terminé', planned: 'À voir', dropped: 'Abandonné' };
  el.querySelector('.status-badge').className = `status-badge status-${item.status}`;
  el.querySelector('.status-badge').textContent = statusLabels[item.status];
  el.querySelector('.ep-input').value = item.currentEp;
  el.querySelector('.ep-total').textContent = item.episodes ? `/ ${item.episodes}` : '';
  el.querySelector('.progress-bar').style.width = `${pct}%`;
  el.querySelector('.status-select').value = item.status;
}

// =====================
// RENDER ALL
// =====================
function render() {
  const grid = document.getElementById('animeGrid');
  const filtered = currentFilter === 'all' ? list : list.filter(x => x.status === currentFilter);

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <h3>Rien ici pour l'instant</h3>
      <p>Recherche un anime en haut pour l'ajouter à ta liste.</p>
    </div>`;
    updateStats();
    updateBadges();
    return;
  }

  grid.innerHTML = filtered.map(item => {
    const pct = item.episodes ? Math.round((item.currentEp / item.episodes) * 100) : 0;
    const statusLabels = { watching: 'En cours', completed: 'Terminé', planned: 'À voir', dropped: 'Abandonné' };
    return `<div class="anime-card" id="card-${item.id}">
      <button class="card-delete" onclick="deleteAnime(${item.id})" aria-label="Supprimer">✕</button>
      <img class="anime-cover" src="${item.cover}" alt="${item.title}" loading="lazy">
      <div class="anime-card-body">
        <div class="anime-card-title">${item.title}</div>
        <span class="status-badge status-${item.status}">${statusLabels[item.status]}</span>
        <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
        <div class="episode-row">
          <button class="ep-btn" onclick="changeEp(${item.id}, -1)" aria-label="-1 épisode">−</button>
          <input class="ep-input" type="number" value="${item.currentEp}" min="0" max="${item.episodes || 9999}"
            onchange="updateEp(${item.id}, this.value)"
            oninput="updateEp(${item.id}, this.value)">
          <span class="ep-total">${item.episodes ? '/ ' + item.episodes : ''}</span>
          <button class="ep-btn" onclick="changeEp(${item.id}, 1)" aria-label="+1 épisode">+</button>
        </div>
        <select class="status-select" onchange="updateStatus(${item.id}, this.value)">
          <option value="watching" ${item.status==='watching'?'selected':''}>En cours</option>
          <option value="completed" ${item.status==='completed'?'selected':''}>Terminé</option>
          <option value="planned" ${item.status==='planned'?'selected':''}>À voir</option>
          <option value="dropped" ${item.status==='dropped'?'selected':''}>Abandonné</option>
        </select>
      </div>
    </div>`;
  }).join('');

  updateStats();
  updateBadges();
}

// =====================
// STATS
// =====================
function updateStats() {
  document.getElementById('stat-total').textContent = list.length;
  document.getElementById('stat-eps').textContent = list.reduce((s, x) => s + x.currentEp, 0);
  document.getElementById('stat-done').textContent = list.filter(x => x.status === 'completed').length;
  document.getElementById('stat-watching').textContent = list.filter(x => x.status === 'watching').length;
}

function updateBadges() {
  document.getElementById('badge-all').textContent = list.length;
  document.getElementById('badge-watching').textContent = list.filter(x => x.status === 'watching').length;
  document.getElementById('badge-completed').textContent = list.filter(x => x.status === 'completed').length;
  document.getElementById('badge-planned').textContent = list.filter(x => x.status === 'planned').length;
  document.getElementById('badge-dropped').textContent = list.filter(x => x.status === 'dropped').length;
}

// =====================
// TOAST
// =====================
function toast(msg, type = 'info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// =====================
// THEME TOGGLE
// =====================
(function(){
  const btn = document.querySelector('[data-theme-toggle]');
  const html = document.documentElement;
  btn.addEventListener('click', () => {
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    btn.innerHTML = isDark
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  });
})();

// =====================
// INIT
// =====================
render();
</script>
</body>
</html>
