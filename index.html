<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AniTrack — Suis tes animes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300..700&display=swap" rel="stylesheet">
  <style>
    /* ===== TOKENS ===== */
    :root, [data-theme="light"] {
      --bg:              #f7f6f2;
      --surface:         #f9f8f5;
      --surface-2:       #fbfbf9;
      --surface-off:     #f3f0ec;
      --border:          rgba(40,37,29,.12);
      --text:            #28251d;
      --muted:           #7a7974;
      --faint:           #bab9b4;
      --primary:         #7c3aed;
      --primary-h:       #6d28d9;
      --primary-hl:      #ede9fe;
      --success:         #437a22;
      --success-hl:      #d4dfcc;
      --warning:         #d19900;
      --warning-hl:      #e9e0c6;
      --error:           #a12c7b;
      --error-hl:        #e0ced7;
      --radius-sm:       .375rem;
      --radius-md:       .5rem;
      --radius-lg:       .75rem;
      --radius-xl:       1rem;
      --radius-full:     9999px;
      --shadow-sm:       0 1px 2px rgba(0,0,0,.06);
      --shadow-md:       0 4px 12px rgba(0,0,0,.08);
      --shadow-lg:       0 12px 32px rgba(0,0,0,.12);
      --font-display:    'Syne', system-ui, sans-serif;
      --font-body:       'DM Sans', system-ui, sans-serif;
      --text-xs:         clamp(.75rem, .7rem + .25vw, .875rem);
      --text-sm:         clamp(.875rem, .8rem + .35vw, 1rem);
      --text-base:       clamp(1rem, .95rem + .25vw, 1.125rem);
      --text-lg:         clamp(1.125rem, 1rem + .75vw, 1.5rem);
      --text-xl:         clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-2xl:        clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
      --sp1:.25rem;--sp2:.5rem;--sp3:.75rem;--sp4:1rem;--sp5:1.25rem;
      --sp6:1.5rem;--sp8:2rem;--sp10:2.5rem;--sp12:3rem;--sp16:4rem;
    }
    [data-theme="dark"] {
      --bg:              #0e0c12;
      --surface:         #141020;
      --surface-2:       #1a1628;
      --surface-off:     #1e1a2e;
      --border:          rgba(255,255,255,.1);
      --text:            #e8e4f0;
      --muted:           #8a85a0;
      --faint:           #4a4660;
      --primary:         #a78bfa;
      --primary-h:       #c4b5fd;
      --primary-hl:      #2e2040;
      --success:         #6daa45;
      --success-hl:      #1e3010;
      --warning:         #e8af34;
      --warning-hl:      #302200;
      --error:           #d163a7;
      --error-hl:        #3a1030;
      --shadow-sm:       0 1px 2px rgba(0,0,0,.3);
      --shadow-md:       0 4px 12px rgba(0,0,0,.4);
      --shadow-lg:       0 12px 32px rgba(0,0,0,.5);
    }

    /* ===== RESET ===== */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
    body{
      min-height:100dvh;
      font-family:var(--font-body);
      font-size:var(--text-base);
      color:var(--text);
      background:var(--bg);
      line-height:1.6;
      transition:background .25s,color .25s;
    }
    img{display:block;max-width:100%;height:auto}
    button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
    input,select{font:inherit;color:inherit}
    a{color:var(--primary)}

    /* ===== LAYOUT ===== */
    .wrap{max-width:1180px;margin-inline:auto;padding-inline:var(--sp6)}
    @media(max-width:640px){.wrap{padding-inline:var(--sp4)}}

    /* ===== TOPBAR ===== */
    .topbar{
      position:sticky;top:0;z-index:100;
      background:color-mix(in oklch, var(--bg) 85%, transparent);
      backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      padding-block:var(--sp4);
    }
    .topbar-inner{
      display:flex;justify-content:space-between;align-items:center;gap:var(--sp4);
    }
    .brand{display:flex;align-items:center;gap:var(--sp3);text-decoration:none;color:var(--text)}
    .brand-logo{
      width:36px;height:36px;border-radius:var(--radius-md);
      background:linear-gradient(135deg,var(--primary),#4f46e5);
      display:grid;place-items:center;flex-shrink:0;
    }
    .brand-logo svg{color:#fff}
    .brand-name{font-family:var(--font-display);font-weight:800;font-size:var(--text-lg);line-height:1}
    .topbar-actions{display:flex;align-items:center;gap:var(--sp2)}

    /* ===== BUTTONS ===== */
    .btn{
      display:inline-flex;align-items:center;gap:var(--sp2);
      padding:var(--sp2) var(--sp4);border-radius:var(--radius-md);
      font-size:var(--text-sm);font-weight:600;
      transition:background .18s,color .18s,box-shadow .18s,transform .12s;
    }
    .btn:active{transform:scale(.97)}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary-h)}
    .btn-ghost{
      background:transparent;border:1px solid var(--border);color:var(--muted);
    }
    .btn-ghost:hover{background:var(--surface-off);color:var(--text)}
    .btn-icon{width:36px;height:36px;padding:0;border-radius:var(--radius-md);justify-content:center}
    .btn-danger{background:var(--error-hl);color:var(--error)}
    .btn-danger:hover{background:var(--error);color:#fff}

    /* ===== HERO ===== */
    .hero{
      padding:var(--sp16) 0 var(--sp12);
      text-align:center;
    }
    .hero-eyebrow{
      display:inline-flex;align-items:center;gap:var(--sp2);
      padding:var(--sp1) var(--sp3);border-radius:var(--radius-full);
      background:var(--primary-hl);color:var(--primary);
      font-size:var(--text-xs);font-weight:700;letter-spacing:.06em;text-transform:uppercase;
      margin-bottom:var(--sp6);
    }
    .hero h1{
      font-family:var(--font-display);font-size:var(--text-2xl);font-weight:800;
      line-height:1.1;margin-bottom:var(--sp5);
    }
    .hero h1 span{
      background:linear-gradient(135deg,var(--primary),#818cf8);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .hero p{
      font-size:var(--text-lg);color:var(--muted);max-width:55ch;margin-inline:auto;
    }
    .hero-stats{
      display:flex;justify-content:center;gap:var(--sp8);margin-top:var(--sp8);
      flex-wrap:wrap;
    }
    .stat{text-align:center}
    .stat-num{
      font-family:var(--font-display);font-size:var(--text-xl);font-weight:800;
      color:var(--primary);display:block;
    }
    .stat-label{font-size:var(--text-xs);color:var(--muted);text-transform:uppercase;letter-spacing:.05em}

    /* ===== FILTERS ===== */
    .filter-bar{
      display:flex;gap:var(--sp2);flex-wrap:wrap;
      padding:var(--sp4) 0;border-top:1px solid var(--border);
    }
    .filter-chip{
      padding:var(--sp1) var(--sp4);border-radius:var(--radius-full);
      font-size:var(--text-sm);font-weight:600;
      background:var(--surface);border:1px solid var(--border);
      color:var(--muted);cursor:pointer;transition:all .18s;
    }
    .filter-chip:hover,.filter-chip.active{
      background:var(--primary-hl);color:var(--primary);border-color:transparent;
    }

    /* ===== SEARCH BOX ===== */
    .search-section{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius-xl);padding:var(--sp6);
      box-shadow:var(--shadow-md);margin-bottom:var(--sp8);
    }
    .search-section h2{
      font-family:var(--font-display);font-size:var(--text-lg);
      font-weight:700;margin-bottom:var(--sp4);
    }
    .search-row{display:flex;gap:var(--sp3)}
    .search-input{
      flex:1;background:var(--surface-2);border:1px solid var(--border);
      border-radius:var(--radius-md);padding:var(--sp3) var(--sp4);
      outline:none;transition:border-color .18s,box-shadow .18s;
    }
    .search-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in oklch, var(--primary) 20%, transparent)}
    @media(max-width:640px){.search-row{flex-direction:column}}

    /* ===== RESULTS GRID ===== */
    .results-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(min(220px,100%), 1fr));
      gap:var(--sp4);margin-top:var(--sp5);
    }
    .result-card{
      background:var(--surface-2);border:1px solid var(--border);
      border-radius:var(--radius-lg);overflow:hidden;
      transition:transform .18s,box-shadow .18s;cursor:pointer;
    }
    .result-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
    .result-cover{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--surface-off)}
    .result-info{padding:var(--sp3) var(--sp4)}
    .result-title{
      font-family:var(--font-display);font-weight:700;font-size:var(--text-sm);
      line-height:1.3;margin-bottom:var(--sp1);
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .result-meta{font-size:var(--text-xs);color:var(--muted);margin-bottom:var(--sp3)}
    .result-add{width:100%;border-radius:var(--radius-sm);padding:var(--sp2) var(--sp3);text-align:center}

    /* ===== MY LIST ===== */
    .section-header{
      display:flex;justify-content:space-between;align-items:center;
      flex-wrap:wrap;gap:var(--sp3);margin-bottom:var(--sp5);
    }
    .section-header h2{font-family:var(--font-display);font-size:var(--text-xl);font-weight:800}
    .list-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(min(320px,100%), 1fr));
      gap:var(--sp5);
    }
    .anime-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius-xl);overflow:hidden;
      box-shadow:var(--shadow-sm);transition:box-shadow .18s;
      display:flex;flex-direction:column;
    }
    .anime-card:hover{box-shadow:var(--shadow-md)}
    .anime-card-top{display:flex;gap:var(--sp4);padding:var(--sp4);align-items:flex-start}
    .anime-cover{
      width:72px;height:100px;object-fit:cover;border-radius:var(--radius-md);
      flex-shrink:0;background:var(--surface-off);
    }
    .anime-header{flex:1;min-width:0}
    .anime-title{
      font-family:var(--font-display);font-weight:700;font-size:var(--text-base);
      line-height:1.3;margin-bottom:var(--sp1);
    }
    .anime-eps{font-size:var(--text-xs);color:var(--muted);margin-bottom:var(--sp2)}
    .badge{
      display:inline-flex;align-items:center;gap:4px;
      padding:3px 10px;border-radius:var(--radius-full);
      font-size:var(--text-xs);font-weight:700;
    }
    .badge-watching{background:var(--warning-hl);color:var(--warning)}
    .badge-completed{background:var(--success-hl);color:var(--success)}
    .badge-planned{background:var(--primary-hl);color:var(--primary)}

    /* Progress bar */
    .progress-wrap{padding:0 var(--sp4) var(--sp4)}
    .progress-bar-bg{
      height:6px;background:var(--surface-off);border-radius:var(--radius-full);
      overflow:hidden;margin-bottom:var(--sp3);
    }
    .progress-bar-fill{
      height:100%;background:linear-gradient(90deg,var(--primary),#818cf8);
      border-radius:var(--radius-full);transition:width .4s cubic-bezier(.16,1,.3,1);
    }

    /* Controls */
    .anime-controls{
      display:grid;grid-template-columns:1fr 1fr auto;gap:var(--sp2);
      padding:0 var(--sp4) var(--sp4);
    }
    .ctrl-input,.ctrl-select{
      background:var(--surface-2);border:1px solid var(--border);
      border-radius:var(--radius-md);padding:var(--sp2) var(--sp3);
      font-size:var(--text-sm);outline:none;
      transition:border-color .18s;
    }
    .ctrl-input:focus,.ctrl-select:focus{border-color:var(--primary)}
    .ctrl-input{text-align:center}
    @media(max-width:480px){.anime-controls{grid-template-columns:1fr 1fr;}.anime-controls .btn-danger{grid-column:1/-1}}

    /* ===== EMPTY STATE ===== */
    .empty-state{
      text-align:center;padding:var(--sp16) var(--sp8);
      color:var(--muted);
    }
    .empty-icon{
      width:56px;height:56px;margin:0 auto var(--sp4);
      color:var(--faint);
    }
    .empty-state h3{color:var(--text);margin-bottom:var(--sp2);font-family:var(--font-display)}
    .empty-state p{max-width:36ch;margin-inline:auto}

    /* ===== LOADER ===== */
    .loader{display:flex;align-items:center;gap:var(--sp2);color:var(--muted);padding:var(--sp4) 0}
    .spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .fade-in{animation:fadeIn .25s ease}

    /* ===== TOAST ===== */
    .toast-wrap{position:fixed;bottom:var(--sp6);right:var(--sp6);z-index:999;display:flex;flex-direction:column;gap:var(--sp2)}
    .toast{
      background:var(--surface-2);border:1px solid var(--border);
      border-radius:var(--radius-md);padding:var(--sp3) var(--sp4);
      box-shadow:var(--shadow-lg);font-size:var(--text-sm);
      animation:fadeIn .2s ease;
    }

    /* ===== MISC ===== */
    .divider{border:none;border-top:1px solid var(--border);margin:var(--sp6) 0}
    .label-file{cursor:pointer;display:inline-flex}
    a[href]{text-decoration:none}
    a[href]:hover{text-decoration:underline}

    @media(prefers-color-scheme:dark){:root:not([data-theme]){
      --bg:#0e0c12;--surface:#141020;--surface-2:#1a1628;--surface-off:#1e1a2e;
      --border:rgba(255,255,255,.1);--text:#e8e4f0;--muted:#8a85a0;--faint:#4a4660;
      --primary:#a78bfa;--primary-h:#c4b5fd;--primary-hl:#2e2040;
      --success:#6daa45;--success-hl:#1e3010;--warning:#e8af34;--warning-hl:#302200;
      --error:#d163a7;--error-hl:#3a1030;
      --shadow-sm:0 1px 2px rgba(0,0,0,.3);--shadow-md:0 4px 12px rgba(0,0,0,.4);--shadow-lg:0 12px 32px rgba(0,0,0,.5);
    }}
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a class="brand" href="#">
        <div class="brand-logo" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </div>
        <span class="brand-name">AniTrack</span>
      </a>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-icon" id="exportBtn" title="Exporter JSON">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <label class="btn btn-ghost btn-icon label-file" title="Importer JSON">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <input type="file" id="importInput" accept="application/json" style="display:none">
        </label>
        <button class="btn btn-ghost btn-icon" id="themeToggle" aria-label="Basculer le thème" title="Thème clair/sombre">
          <svg id="iconSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg id="iconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main>
    <section class="wrap hero">
      <div class="hero-eyebrow">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Propulsé par AniList
      </div>
      <h1>Suis tes animes,<br><span>ne perds plus ta place.</span></h1>
      <p>Recherche n'importe quel anime, ajoute-le à ta liste et marque l'épisode où tu t'es arrêté.</p>
      <div class="hero-stats">
        <div class="stat"><span class="stat-num" id="statTotal">0</span><span class="stat-label">En liste</span></div>
        <div class="stat"><span class="stat-num" id="statWatching">0</span><span class="stat-label">En cours</span></div>
        <div class="stat"><span class="stat-num" id="statCompleted">0</span><span class="stat-label">Terminés</span></div>
        <div class="stat"><span class="stat-num" id="statPlanned">0</span><span class="stat-label">À voir</span></div>
      </div>
    </section>

    <div class="wrap">
      <!-- SEARCH -->
      <section class="search-section">
        <h2>
          <svg width="18" height="18" style="display:inline;vertical-align:-.2em;margin-right:8px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Rechercher un anime
        </h2>
        <div class="search-row">
          <input id="searchInput" class="search-input" type="text" placeholder="Ex. One Piece, Naruto, Jujutsu Kaisen…" autocomplete="off" />
          <button class="btn btn-primary" id="searchBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            Rechercher
          </button>
        </div>
        <div id="searchResults"></div>
      </section>

      <hr class="divider">

      <!-- MY LIST -->
      <div class="section-header">
        <h2>Ma liste</h2>
        <div class="filter-bar" style="border:none;padding:0;margin:0">
          <button class="filter-chip active" data-filter="all">Tout</button>
          <button class="filter-chip" data-filter="watching">En cours</button>
          <button class="filter-chip" data-filter="completed">Terminés</button>
          <button class="filter-chip" data-filter="planned">À voir</button>
        </div>
      </div>

      <div id="animeList" class="list-grid"></div>
    </div>
  </main>

  <div class="toast-wrap" id="toastWrap"></div>

  <script>
  (function(){
    const STORAGE_KEY = 'anitrack-v2';
    let myList = load();
    let currentFilter = 'all';

    /* ===== STORAGE ===== */
    function load(){
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
    }
    function save(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(myList));
      renderList();
      renderStats();
    }

    /* ===== THEME ===== */
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const iconSun = document.getElementById('iconSun');
    const iconMoon = document.getElementById('iconMoon');
    let isDark = html.getAttribute('data-theme') === 'dark';
    syncThemeIcons();
    themeToggle.addEventListener('click', () => {
      isDark = !isDark;
      html.setAttribute('data-theme', isDark ? 'dark' : 'light');
      syncThemeIcons();
    });
    function syncThemeIcons(){
      iconSun.style.display = isDark ? 'none' : 'block';
      iconMoon.style.display = isDark ? 'block' : 'none';
    }

    /* ===== TOAST ===== */
    function toast(msg){
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      document.getElementById('toastWrap').appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    /* ===== STATS ===== */
    function renderStats(){
      document.getElementById('statTotal').textContent = myList.length;
      document.getElementById('statWatching').textContent = myList.filter(a => a.status === 'watching').length;
      document.getElementById('statCompleted').textContent = myList.filter(a => a.status === 'completed').length;
      document.getElementById('statPlanned').textContent = myList.filter(a => a.status === 'planned').length;
    }

    /* ===== SEARCH ===== */
    async function searchAnime(){
      const q = document.getElementById('searchInput').value.trim();
      const container = document.getElementById('searchResults');
      if(!q){ container.innerHTML = ''; return; }
      container.innerHTML = '<div class="loader"><div class="spin"></div> Recherche en cours…</div>';
      const gql = `query($s:String){Page(page:1,perPage:12){media(search:$s,type:ANIME,sort:POPULARITY_DESC){id title{userPreferred romaji}episodes status coverImage{large}format seasonYear siteUrl}}}`;
      try {
        const r = await fetch('https://graphql.anilist.co',{
          method:'POST',
          headers:{'Content-Type':'application/json','Accept':'application/json'},
          body:JSON.stringify({query:gql,variables:{s:q}})
        });
        const data = await r.json();
        const items = data?.data?.Page?.media || [];
        if(!items.length){ container.innerHTML = '<p style="color:var(--muted);padding:var(--sp4) 0">Aucun résultat pour cette recherche.</p>'; return; }
        container.innerHTML = '<div class="results-grid"></div>';
        const grid = container.querySelector('.results-grid');
        items.forEach(item => {
          const title = item.title.userPreferred || item.title.romaji || 'Titre inconnu';
          const alreadyAdded = myList.some(a => a.id === item.id);
          const card = document.createElement('article');
          card.className = 'result-card fade-in';
          card.innerHTML = `
            <img class="result-cover" src="${h(item.coverImage?.large || '')}" alt="${h(title)}" loading="lazy">
            <div class="result-info">
              <div class="result-title">${h(title)}</div>
              <div class="result-meta">${h(item.format||'?')} · ${item.episodes||'?'} ép. · ${item.seasonYear||'?'}</div>
              <button class="btn result-add ${alreadyAdded ? 'btn-ghost' : 'btn-primary'}" data-id="${item.id}" ${alreadyAdded ? 'disabled' : ''}>
                ${alreadyAdded ? '✓ Ajouté' : '+ Ajouter'}
              </button>
            </div>`;
          card.querySelector('button').addEventListener('click', () => {
            addAnime({
              id: item.id, title,
              episodes: item.episodes || 0,
              cover: item.coverImage?.large || '',
              siteUrl: item.siteUrl || '',
              status: 'watching', currentEpisode: 0
            });
            card.querySelector('button').textContent = '✓ Ajouté';
            card.querySelector('button').disabled = true;
            card.querySelector('button').className = 'btn result-add btn-ghost';
          });
          grid.appendChild(card);
        });
      } catch(e) {
        container.innerHTML = '<p style="color:var(--error);padding:var(--sp4) 0">Erreur lors de la requête AniList. Réessaie dans un instant.</p>';
      }
    }

    /* ===== ADD ===== */
    function addAnime(anime){
      if(myList.some(a => a.id === anime.id)){ toast('Déjà dans ta liste !'); return; }
      myList.unshift(anime);
      save();
      toast(`"${anime.title}" ajouté à ta liste`);
    }

    /* ===== RENDER LIST ===== */
    function renderList(){
      const container = document.getElementById('animeList');
      const filtered = currentFilter === 'all' ? myList : myList.filter(a => a.status === currentFilter);
      if(!filtered.length){
        container.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></div>
          <h3>${currentFilter === 'all' ? 'Ta liste est vide' : 'Aucun anime ici'}</h3>
          <p>${currentFilter === 'all' ? 'Recherche un anime ci-dessus et ajoute-le à ta liste.' : 'Change le filtre ou ajoute des animes dans cette catégorie.'}</p>
        </div>`;
        return;
      }
      container.innerHTML = '';
      filtered.forEach(anime => {
        const pct = anime.episodes ? Math.round((anime.currentEpisode / anime.episodes) * 100) : 0;
        const badgeClass = anime.status === 'completed' ? 'badge-completed' : anime.status === 'planned' ? 'badge-planned' : 'badge-watching';
        const badgeText = anime.status === 'completed' ? '✓ Terminé' : anime.status === 'planned' ? '⏸ À voir' : '▶ En cours';
        const card = document.createElement('article');
        card.className = 'anime-card fade-in';
        card.dataset.id = anime.id;
        card.innerHTML = `
          <div class="anime-card-top">
            <img class="anime-cover" src="${h(anime.cover)}" alt="${h(anime.title)}" loading="lazy">
            <div class="anime-header">
              <div class="anime-title">${h(anime.title)}</div>
              <div class="anime-eps">${anime.episodes ? anime.currentEpisode + ' / ' + anime.episodes + ' épisodes' : anime.currentEpisode + ' ép. vus'}</div>
              <span class="badge ${badgeClass}">${badgeText}</span>
            </div>
          </div>
          <div class="progress-wrap">
            <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
          </div>
          <div class="anime-controls">
            <input type="number" class="ctrl-input" min="0" max="${anime.episodes || 99999}" value="${anime.currentEpisode}" title="Épisode actuel" placeholder="Épisode">
            <select class="ctrl-select" title="Statut">
              <option value="watching" ${anime.status==='watching'?'selected':''}>En cours</option>
              <option value="completed" ${anime.status==='completed'?'selected':''}>Terminé</option>
              <option value="planned" ${anime.status==='planned'?'selected':''}>À voir</option>
            </select>
            <button class="btn btn-danger btn-icon" title="Supprimer">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>`;

        const epInput = card.querySelector('.ctrl-input');
        const statusSelect = card.querySelector('.ctrl-select');
        const deleteBtn = card.querySelector('.btn-danger');

        epInput.addEventListener('change', () => {
          const val = Math.max(0, parseInt(epInput.value) || 0);
          epInput.value = val;
          myList = myList.map(a => a.id === anime.id ? { ...a, currentEpisode: val } : a);
          save();
        });
        statusSelect.addEventListener('change', () => {
          myList = myList.map(a => a.id === anime.id ? { ...a, status: statusSelect.value } : a);
          save();
        });
        deleteBtn.addEventListener('click', () => {
          myList = myList.filter(a => a.id !== anime.id);
          save();
          toast(`"${anime.title}" retiré de ta liste`);
        });

        container.appendChild(card);
      });
    }

    /* ===== FILTERS ===== */
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentFilter = chip.dataset.filter;
        renderList();
      });
    });

    /* ===== EXPORT / IMPORT ===== */
    document.getElementById('exportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(myList, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'anitrack-backup.json'; a.click();
      URL.revokeObjectURL(url);
      toast('Export téléchargé');
    });
    document.getElementById('importInput').addEventListener('change', async e => {
      const file = e.target.files?.[0]; if(!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        if(!Array.isArray(data)) throw new Error();
        myList = data; save();
        toast('Import réussi — ' + data.length + ' animes chargés');
      } catch { toast('Fichier JSON invalide'); }
      e.target.value = '';
    });

    /* ===== SEARCH EVENTS ===== */
    document.getElementById('searchBtn').addEventListener('click', searchAnime);
    document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key === 'Enter') searchAnime(); });

    /* ===== ESCAPE HTML ===== */
    function h(str){ return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    /* ===== INIT ===== */
    renderList();
    renderStats();
  })();
  </script>
</body>
</html>
