<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;
      --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-2xl:1.25rem;--radius-full:9999px;
      --transition:200ms cubic-bezier(0.16,1,0.3,1);
      --transition-slow:400ms cubic-bezier(0.16,1,0.3,1);
    }
    [data-theme="dark"] {
      --bg:#0c0c0f;--surface:#141418;--surface-2:#1b1b20;--surface-3:#232329;--surface-4:#2a2a31;
      --border:rgba(255,255,255,0.07);--border-hover:rgba(255,255,255,0.15);
      --text:#eaeaec;--text-muted:#898992;--text-faint:#46464e;
      --primary:#7c6af7;--primary-hover:#9585f9;--primary-active:#5f4de8;
      --primary-bg:rgba(124,106,247,0.12);--primary-glow:rgba(124,106,247,0.3);
      --gold:#f59e0b;--green:#34d399;--red:#f87171;--blue:#60a5fa;--pink:#f472b6;
      --shadow:0 4px 32px rgba(0,0,0,0.5);--shadow-lg:0 16px 64px rgba(0,0,0,0.75);
    }
    [data-theme="light"] {
      --bg:#f0f0f5;--surface:#ffffff;--surface-2:#f4f4f9;--surface-3:#e8e8ef;--surface-4:#dddde6;
      --border:rgba(0,0,0,0.07);--border-hover:rgba(0,0,0,0.18);
      --text:#181820;--text-muted:#65656e;--text-faint:#aaaab5;
      --primary:#5c4ee0;--primary-hover:#7c6af7;--primary-active:#3d30c8;
      --primary-bg:rgba(92,78,224,0.09);--primary-glow:rgba(92,78,224,0.2);
      --gold:#d97706;--green:#059669;--red:#dc2626;--blue:#2563eb;--pink:#db2777;
      --shadow:0 4px 24px rgba(0,0,0,0.08);--shadow-lg:0 16px 48px rgba(0,0,0,0.15);
    }
    html { scroll-behavior:smooth; -webkit-font-smoothing:antialiased; }
    body { min-height:100dvh; font-family:'Inter',sans-serif; font-size:var(--text-base); color:var(--text); background:var(--bg); transition:background var(--transition-slow),color var(--transition-slow); overflow-x:hidden; }
    a,button,input,select,textarea { font:inherit; color:inherit; transition:all var(--transition); }
    button { cursor:pointer; background:none; border:none; }
    img { display:block; max-width:100%; }
    :focus-visible { outline:2px solid var(--primary); outline-offset:3px; border-radius:var(--radius-sm); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn { from{opacity:0}to{opacity:1} }
    @keyframes slideInLeft { from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)} }
    @keyframes cardEntrance { from{opacity:0;transform:scale(0.94) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)} }
    @keyframes shimmer { 0%{background-position:-200% 0}100%{background-position:200% 0} }
    @keyframes floatIcon { 0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)} }
    @keyframes toastIn { from{opacity:0;transform:translateX(40px) scale(0.9)}to{opacity:1;transform:translateX(0) scale(1)} }
    @keyframes toastOut { to{opacity:0;transform:translateX(40px) scale(0.9)} }
    @keyframes coverSlideUp { from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)} }
    @keyframes progressShine { 0%,100%{opacity:0}50%{opacity:1} }
    @keyframes starPop { 0%{transform:scale(1)}50%{transform:scale(1.45)}100%{transform:scale(1)} }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes confettiFall {
      0%{transform:translateY(-20px) rotate(0deg);opacity:1}
      100%{transform:translateY(110vh) rotate(720deg);opacity:0}
    }
    @keyframes ripple {
      0%{transform:scale(0);opacity:0.6}
      100%{transform:scale(2.5);opacity:0}
    }

    /* ===== LAYOUT ===== */
    .app { display:grid; grid-template-columns:260px 1fr; min-height:100dvh; }
    @media(max-width:768px){.app{grid-template-columns:1fr}}

    /* ===== SIDEBAR ===== */
    .sidebar {
      background:var(--surface); border-right:1px solid var(--border);
      padding:var(--space-6); display:flex; flex-direction:column; gap:var(--space-6);
      position:sticky; top:0; height:100dvh; overflow-y:auto;
      animation:slideInLeft 0.45s cubic-bezier(0.16,1,0.3,1) both;
    }
    @media(max-width:768px){.sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border);animation:none}}
    .logo { display:flex; align-items:center; gap:var(--space-3); font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:var(--text-lg); color:var(--text); text-decoration:none; }
    .logo-icon { color:var(--primary); filter:drop-shadow(0 0 10px var(--primary-glow)); transition:filter var(--transition); }
    .logo:hover .logo-icon { filter:drop-shadow(0 0 18px var(--primary-glow)); }
    .nav-section-title { font-size:var(--text-xs); font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-faint); margin-bottom:var(--space-2); }
    .nav-btn { width:100%; text-align:left; padding:var(--space-2) var(--space-3); border-radius:var(--radius-md); color:var(--text-muted); font-size:var(--text-sm); font-weight:500; display:flex; align-items:center; gap:var(--space-2); position:relative; overflow:hidden; }
    .nav-btn::before { content:''; position:absolute; inset:0; background:var(--primary-bg); opacity:0; transition:opacity var(--transition); }
    .nav-btn:hover::before { opacity:0.5; }
    .nav-btn:hover { color:var(--text); }
    .nav-btn.active::before { opacity:1; }
    .nav-btn.active { color:var(--primary); font-weight:600; }
    .nav-badge { margin-left:auto; background:var(--surface-3); color:var(--text-muted); font-size:var(--text-xs); padding:0.1rem 0.45rem; border-radius:var(--radius-full); font-weight:700; transition:background var(--transition),color var(--transition); }
    .nav-btn.active .nav-badge { background:var(--primary-bg); color:var(--primary); }
    .sidebar-footer { margin-top:auto; display:flex; align-items:center; justify-content:space-between; }
    .theme-toggle { padding:var(--space-2); border-radius:var(--radius-md); color:var(--text-muted); display:flex; align-items:center; justify-content:center; }
    .theme-toggle:hover { background:var(--surface-2); color:var(--text); }

    /* ===== MAIN ===== */
    .main { padding:var(--space-8); display:flex; flex-direction:column; gap:var(--space-8); animation:fadeUp 0.45s 0.1s cubic-bezier(0.16,1,0.3,1) both; }
    @media(max-width:768px){.main{padding:var(--space-4)}}
    .page-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:var(--space-4); }
    .page-title { font-family:'Space Grotesk',sans-serif; font-size:var(--text-xl); font-weight:700; }
    .page-title span { color:var(--primary); }

    /* ===== SEARCH ===== */
    .search-wrap { position:relative; max-width:480px; flex:1; }
    .search-icon { position:absolute; left:var(--space-3); top:50%; transform:translateY(-50%); color:var(--text-faint); pointer-events:none; transition:color var(--transition); }
    .search-wrap:focus-within .search-icon { color:var(--primary); }
    .search-clear { position:absolute; right:var(--space-3); top:50%; transform:translateY(-50%); color:var(--text-faint); padding:2px; border-radius:var(--radius-sm); display:none; align-items:center; justify-content:center; }
    .search-clear:hover { color:var(--text); }
    .search-clear.visible { display:flex; }
    .search-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:var(--space-3) 2.25rem var(--space-3) 2.5rem; color:var(--text); font-size:var(--text-sm); }
    .search-input::placeholder { color:var(--text-faint); }
    .search-input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-bg); }
    .search-results { position:absolute; top:calc(100% + var(--space-2)); left:0; right:0; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); z-index:200; max-height:420px; overflow-y:auto; display:none; animation:fadeUp 0.2s cubic-bezier(0.16,1,0.3,1); scrollbar-width:thin; scrollbar-color:var(--surface-3) transparent; }
    .search-results.open { display:block; }
    .search-result-item { display:flex; align-items:center; gap:var(--space-3); padding:var(--space-3); cursor:pointer; border-bottom:1px solid var(--border); transition:background var(--transition); }
    .search-result-item:last-child { border-bottom:none; }
    .search-result-item:hover { background:var(--surface-2); }
    .search-result-img { width:40px; height:56px; object-fit:cover; border-radius:var(--radius-sm); background:var(--surface-3); flex-shrink:0; }
    .search-result-info { flex:1; min-width:0; }
    .search-result-title { font-weight:600; font-size:var(--text-sm); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .search-result-meta { font-size:var(--text-xs); color:var(--text-muted); margin-top:2px; }
    .search-add-btn { padding:var(--space-1) var(--space-3); background:var(--primary-bg); color:var(--primary); border-radius:var(--radius-full); font-size:var(--text-xs); font-weight:600; white-space:nowrap; flex-shrink:0; }
    .search-add-btn:hover { background:var(--primary); color:#fff; }
    .search-add-btn.added { background:rgba(52,211,153,0.15); color:var(--green); pointer-events:none; }
    .search-loading,.search-empty { padding:var(--space-6); text-align:center; color:var(--text-muted); font-size:var(--text-sm); }
    .search-spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:var(--space-2); }
    .search-section-header { padding:var(--space-2) var(--space-3); font-size:var(--text-xs); font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-faint); background:var(--surface-2); border-bottom:1px solid var(--border); }

    /* ===== STATS ===== */
    .stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:var(--space-4); }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:var(--space-4); transition:transform var(--transition),border-color var(--transition),box-shadow var(--transition); animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both; }
    .stat-card:nth-child(1){animation-delay:.1s}.stat-card:nth-child(2){animation-delay:.15s}.stat-card:nth-child(3){animation-delay:.2s}.stat-card:nth-child(4){animation-delay:.25s}
    .stat-card:hover { transform:translateY(-3px); border-color:var(--primary); box-shadow:0 0 0 1px var(--primary-bg),var(--shadow); }
    .stat-value { font-family:'Space Grotesk',sans-serif; font-size:var(--text-xl); font-weight:700; color:var(--primary); transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    .stat-card:hover .stat-value { transform:scale(1.08); }
    .stat-label { font-size:var(--text-xs); color:var(--text-muted); margin-top:var(--space-1); }

    /* ===== TRENDING ===== */
    .trending-section { display:flex; flex-direction:column; gap:var(--space-4); }
    .section-heading { display:flex; align-items:center; gap:var(--space-2); font-size:var(--text-sm); font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; }
    .section-heading-icon { color:var(--primary); }
    .trending-scroll { display:flex; gap:var(--space-3); overflow-x:auto; padding-bottom:var(--space-2); scrollbar-width:thin; scrollbar-color:var(--surface-3) transparent; }
    .trending-scroll::-webkit-scrollbar{height:4px}.trending-scroll::-webkit-scrollbar-track{background:transparent}.trending-scroll::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:4px}
    .trending-card { flex-shrink:0; width:135px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; cursor:pointer; transition:transform var(--transition),border-color var(--transition),box-shadow var(--transition); }
    .trending-card:hover { transform:translateY(-6px) scale(1.02); border-color:var(--primary); box-shadow:0 10px 28px rgba(124,106,247,0.25); }
    .trending-cover-wrap { overflow:hidden; }
    .trending-cover { width:100%; aspect-ratio:2/3; object-fit:cover; background:var(--surface-3); transition:transform 0.4s ease; }
    .trending-card:hover .trending-cover { transform:scale(1.05); }
    .trending-info { padding:var(--space-2); }
    .trending-title { font-size:var(--text-xs); font-weight:600; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .trending-score { font-size:var(--text-xs); color:var(--gold); font-weight:700; margin-top:3px; }
    .trending-add { width:100%; margin-top:var(--space-2); padding:var(--space-1) 0; background:var(--primary-bg); color:var(--primary); border-radius:var(--radius-sm); font-size:var(--text-xs); font-weight:700; }
    .trending-add:hover { background:var(--primary); color:#fff; }
    .trending-add.added { background:rgba(52,211,153,0.15); color:var(--green); pointer-events:none; }
    .skeleton { background:linear-gradient(90deg,var(--surface-2) 25%,var(--surface-3) 50%,var(--surface-2) 75%); background-size:200% 100%; animation:shimmer 1.5s ease-in-out infinite; }
    .sk-cover { width:135px; height:202px; border-radius:var(--radius-lg) var(--radius-lg) 0 0; }
    .sk-text { height:10px; margin:var(--space-2); border-radius:4px; }
    .sk-text.short { width:60%; }

    /* ===== FILTERS ===== */
    .filters { display:flex; gap:var(--space-2); flex-wrap:wrap; }
    .filter-btn { padding:var(--space-1) var(--space-4); border-radius:var(--radius-full); border:1px solid var(--border); font-size:var(--text-sm); font-weight:500; color:var(--text-muted); background:var(--surface); }
    .filter-btn:hover { border-color:var(--primary); color:var(--primary); transform:translateY(-1px); }
    .filter-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); box-shadow:0 4px 14px var(--primary-glow); }

    /* ===== ANIME GRID ===== */
    .anime-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(min(200px,100%),1fr)); gap:var(--space-4); }
    .anime-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; display:flex; flex-direction:column; position:relative; transition:transform var(--transition),border-color var(--transition),box-shadow var(--transition); animation:cardEntrance 0.4s cubic-bezier(0.16,1,0.3,1) both; }
    .anime-card:hover { border-color:var(--primary); box-shadow:0 0 0 1px var(--primary-bg),var(--shadow); transform:translateY(-4px); }
    .anime-cover-wrap { position:relative; cursor:pointer; overflow:hidden; }
    .anime-cover { width:100%; aspect-ratio:2/3; object-fit:cover; background:var(--surface-3); display:block; transition:transform 0.4s ease; }
    .anime-cover-wrap:hover .anime-cover { transform:scale(1.07); }
    .anime-cover-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0) 55%); opacity:0; display:flex; align-items:center; justify-content:center; transition:opacity var(--transition); }
    .anime-cover-wrap:hover .anime-cover-overlay { opacity:1; }
    .cover-play-btn { width:44px; height:44px; border-radius:var(--radius-full); background:rgba(255,255,255,0.92); color:#111; display:flex; align-items:center; justify-content:center; transform:scale(0.78); transition:transform var(--transition); }
    .anime-cover-wrap:hover .cover-play-btn { transform:scale(1); }
    .anime-card-body { padding:var(--space-3); flex:1; display:flex; flex-direction:column; gap:var(--space-2); }
    .anime-card-title { font-weight:600; font-size:var(--text-sm); line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .status-badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:var(--radius-full); font-size:var(--text-xs); font-weight:600; }
    .status-watching{background:rgba(124,106,247,0.15);color:var(--primary)}
    .status-completed{background:rgba(52,211,153,0.15);color:var(--green)}
    .status-planned{background:rgba(245,158,11,0.15);color:var(--gold)}
    .status-dropped{background:rgba(248,113,113,0.15);color:var(--red)}
    .status-catchup{background:rgba(96,165,250,0.15);color:var(--blue)}
    .episode-row { display:flex; align-items:center; gap:var(--space-2); margin-top:auto; }
    .ep-btn { width:28px; height:28px; border-radius:var(--radius-sm); background:var(--surface-2); color:var(--text); display:flex; align-items:center; justify-content:center; font-size:1rem; font-weight:700; flex-shrink:0; }
    .ep-btn:hover { background:var(--primary); color:#fff; transform:scale(0.94); }
    .ep-input { flex:1; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:var(--space-1) var(--space-2); font-size:var(--text-sm); text-align:center; color:var(--text); }
    .ep-input:focus { outline:none; border-color:var(--primary); }
    .ep-total { font-size:var(--text-xs); color:var(--text-faint); white-space:nowrap; }
    .progress-bar-wrap { height:4px; background:var(--surface-3); border-radius:2px; overflow:hidden; }
    .progress-bar { height:100%; background:linear-gradient(90deg,var(--primary),var(--primary-hover)); border-radius:2px; transition:width 0.5s cubic-bezier(0.16,1,0.3,1); position:relative; }
    .progress-bar::after { content:''; position:absolute; top:0; right:0; bottom:0; width:20px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3)); animation:progressShine 2s ease-in-out infinite; }
    .status-select { width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:var(--space-1) var(--space-2); font-size:var(--text-xs); color:var(--text); cursor:pointer; }
    .status-select:focus { outline:none; border-color:var(--primary); }
    .card-delete { position:absolute; top:var(--space-2); right:var(--space-2); width:28px; height:28px; background:rgba(0,0,0,0.65); color:var(--red); border-radius:var(--radius-sm); display:none; align-items:center; justify-content:center; font-size:0.8rem; z-index:2; }
    .anime-card:hover .card-delete { display:flex; }
    .card-delete:hover { background:var(--red); color:#fff; transform:scale(1.1); }
    .card-note-preview { font-size:var(--text-xs); color:var(--text-muted); font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-rating-preview { display:flex; gap:1px; margin-top:2px; }
    .card-star-preview { font-size:0.65rem; }

    /* ===== EMPTY STATE ===== */
    .empty-state { display:flex; flex-direction:column; align-items:center; text-align:center; padding:var(--space-12) var(--space-8); color:var(--text-muted); gap:var(--space-4); grid-column:1/-1; animation:fadeUp 0.4s ease; }
    .empty-state svg { color:var(--text-faint); animation:floatIcon 3s ease-in-out infinite; }
    .empty-state h3 { color:var(--text); font-size:var(--text-lg); }
    .empty-state p { max-width:36ch; font-size:var(--text-sm); }

    /* ===== TOAST ===== */
    .toast-container { position:fixed; bottom:var(--space-6); right:var(--space-6); display:flex; flex-direction:column; gap:var(--space-2); z-index:900; }
    .toast { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:var(--space-3) var(--space-4); font-size:var(--text-sm); box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:var(--space-2); animation:toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }
    .toast.out { animation:toastOut 0.25s ease forwards; }
    .toast.success{border-left:3px solid var(--green)}
    .toast.error{border-left:3px solid var(--red)}
    .toast.info{border-left:3px solid var(--primary)}

    /* ===== MODAL ===== */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.82); backdrop-filter:blur(6px); z-index:500; display:flex; align-items:center; justify-content:center; padding:var(--space-4); opacity:0; pointer-events:none; transition:opacity 0.3s ease; }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-2xl); width:100%; max-width:780px; max-height:92dvh; overflow-y:auto; box-shadow:var(--shadow-lg); transform:translateY(28px) scale(0.97); transition:transform 0.3s cubic-bezier(0.16,1,0.3,1); scrollbar-width:thin; scrollbar-color:var(--surface-3) transparent; }
    .modal-overlay.open .modal { transform:translateY(0) scale(1); }
    .modal-hero { position:relative; width:100%; height:250px; overflow:hidden; flex-shrink:0; }

    .rating-star.active { filter:none; animation:starPop 0.25s ease; }

<script>
// =============================================
// DATA
// =============================================
let animeList = JSON.parse(localStorage.getItem('anitrack_v2') || '[]');
let currentFilter = 'all';
let currentModal = null;
let currentModalLocal = null;
let trendingCache = null;
let searchTimer = null;
let isDark = document.documentElement.getAttribute('data-theme') === 'dark';

const GENRES_FR = {
  'Action':'Action','Adventure':'Aventure','Comedy':'Comédie','Drama':'Drame',
  'Ecchi':'Ecchi','Fantasy':'Fantasy','Horror':'Horreur','Mahou Shoujo':'Mahou Shoujo',
  'Mecha':'Mecha','Music':'Musique','Mystery':'Mystère','Psychological':'Psychologique',
  'Romance':'Romance','Sci-Fi':'Science-Fiction','Slice of Life':'Tranche de vie',
  'Sports':'Sport','Supernatural':'Surnaturel','Thriller':'Thriller','Hentai':'Hentai',
  'Shounen':'Shounen','Shoujo':'Shoujo','Seinen':'Seinen','Josei':'Josei'
};
const STATUS_FR = {
  'FINISHED':'Terminé','RELEASING':'En diffusion','NOT_YET_RELEASED':'Pas encore sorti',
  'CANCELLED':'Annulé','HIATUS':'En pause'
};
const FORMAT_FR = {
  'TV':'Série TV','TV_SHORT':'Série TV (court)','MOVIE':'Film','SPECIAL':'Spécial',
  'OVA':'OVA','ONA':'ONA','MUSIC':'Clip Musical','MANGA':'Manga','NOVEL':'Roman',
  'ONE_SHOT':'One Shot','LIGHT_NOVEL':'Light Novel'
};
const SEASON_FR = {'WINTER':'Hiver','SPRING':'Printemps','SUMMER':'Été','FALL':'Automne'};
const SOURCE_FR = {
  'ORIGINAL':'Original','MANGA':'Manga','LIGHT_NOVEL':'Light Novel','VISUAL_NOVEL':'Visual Novel',
  'VIDEO_GAME':'Jeu vidéo','OTHER':'Autre','NOVEL':'Roman','DOUJINSHI':'Doujinshi',
  'ANIME':'Animé','WEB_NOVEL':'Web Novel','LIVE_ACTION':'Live Action','GAME':'Jeu',
  'COMIC':'Comic','MULTIMEDIA_PROJECT':'Projet multimédia','PICTURE_BOOK':'Livre illustré'
};

function save() {
  localStorage.setItem('anitrack_v2', JSON.stringify(animeList));
}

// =============================================
// ANILIST API — avec fallback proxy CORS
// =============================================
async function queryAniList(query, variables) {
  const body = JSON.stringify({ query, variables });
  const headers = { 'Content-Type': 'application/json', 'Accept': 'application/json' };

  const endpoints = [
    'https://graphql.anilist.co',
    'https://corsproxy.io/?' + encodeURIComponent('https://graphql.anilist.co'),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://graphql.anilist.co'),
  ];

  let lastError;
  for (const url of endpoints) {
    try {
      const r = await fetch(url, { method: 'POST', headers, body });
      if (!r.ok) { lastError = new Error('HTTP ' + r.status); continue; }
      const d = await r.json();
      if (d.errors) throw new Error(d.errors[0].message);
      return d.data;
    } catch(e) {
      lastError = e;
    }
  }
  throw lastError || new Error('Impossible de contacter AniList');
}

async function searchAnime(term) {
  const q = `query($s:String){Page(perPage:8){media(search:$s,type:ANIME,sort:SEARCH_MATCH){
    id title{romaji english french native} coverImage{large medium} bannerImage
    format status episodes averageScore seasonYear genres
  }}}`;
  const d = await queryAniList(q, { s: term });
  return d.Page.media;
}

async function fetchTrending() {
  if (trendingCache) return trendingCache;
  const q = `{Page(perPage:20){media(type:ANIME,sort:TRENDING_DESC,status_in:[RELEASING,FINISHED]){
    id title{romaji french} coverImage{large} bannerImage averageScore episodes status
  }}}`;
  const d = await queryAniList(q);
  trendingCache = d.Page.media;
  return trendingCache;
}

async function fetchAnimeDetails(id) {
  const q = `query($id:Int){Media(id:$id,type:ANIME){
    id title{romaji english french native}
    coverImage{extraLarge large} bannerImage
    format status episodes duration averageScore
    seasonYear season source
    description(asHtml:false)
    genres studios(isMain:true){nodes{name}}
    nextAiringEpisode{episode timeUntilAiring}
    characters(sort:ROLE,perPage:6){nodes{name{full} image{large}}}
  }}`;
  const d = await queryAniList(q, { id });
  return d.Media;
}

// =============================================
// TRENDING
// =============================================
async function loadTrending() {
  const scroll = document.getElementById('trendingScroll');
  scroll.innerHTML = Array(10).fill(`<div><div class="skeleton sk-cover"></div><div class="skeleton sk-text"></div><div class="skeleton sk-text short"></div></div>`).join('');
  try {
    const items = await fetchTrending();
    scroll.innerHTML = '';
    items.forEach((a, i) => {
      const inList = animeList.find(x => x.id === a.id);
      const title = a.title.french || a.title.romaji;
      const score = a.averageScore ? `⭐ ${(a.averageScore/10).toFixed(1)}/10` : '';
      const card = document.createElement('div');
      card.className = 'trending-card';
      card.style.animationDelay = (i * 0.04) + 's';
      card.style.animation = 'cardEntrance 0.4s cubic-bezier(0.16,1,0.3,1) both';
      card.innerHTML = `
        <div class="trending-cover-wrap">
          <img class="trending-cover" src="${a.coverImage.large}" alt="${title}" loading="lazy">
        </div>
        <div class="trending-info">
          <div class="trending-title">${title}</div>
          <div class="trending-score">${score}</div>
          <button class="trending-add ${inList ? 'added' : ''}" data-id="${a.id}">${inList ? '✓ Dans ma liste' : '+ Ajouter'}</button>
        </div>`;
      card.querySelector('.trending-cover-wrap').addEventListener('click', () => openModalById(a.id));
      card.querySelector('.trending-add').addEventListener('click', (e) => {
        e.stopPropagation();
        if (!animeList.find(x => x.id === a.id)) {
          addToList(a);
          e.target.textContent = '✓ Dans ma liste';
          e.target.classList.add('added');
        }
      });
      scroll.appendChild(card);
    });
  } catch(e) {
    scroll.innerHTML = '<p style="color:var(--text-muted);font-size:var(--text-sm);padding:var(--space-4)">Impossible de charger les tendances.</p>';
  }
}

// =============================================
// SEARCH
// =============================================
document.getElementById('searchInput').addEventListener('input', function() {
  const val = this.value.trim();
  document.getElementById('searchClear').classList.toggle('visible', val.length > 0);
  clearTimeout(searchTimer);
  if (!val) { closeSearchResults(); return; }
  searchTimer = setTimeout(() => performSearch(val), 250);
});

document.getElementById('searchInput').addEventListener('keydown', (e) => {
  if (e.key === 'Escape') clearSearch();
});

document.addEventListener('click', (e) => {
  if (!document.getElementById('searchInput').contains(e.target) &&
      !document.getElementById('searchResults').contains(e.target)) {
    closeSearchResults();
  }
});

function closeSearchResults() {
  const el = document.getElementById('searchResults');
  el.classList.remove('open');
  el.innerHTML = '';
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  closeSearchResults();
}

async function performSearch(term) {
  const box = document.getElementById('searchResults');
  box.innerHTML = '<div class="search-loading"><span class="search-spinner"></span>Recherche...</div>';
  box.classList.add('open');
  try {
    const local = animeList.filter(a => (a.title || '').toLowerCase().includes(term.toLowerCase()));
    const remote = await searchAnime(term);
    box.innerHTML = '';
    if (local.length > 0) {
      box.insertAdjacentHTML('beforeend', '<div class="search-section-header">📚 Ma liste</div>');
      local.forEach(a => {
        const div = document.createElement('div');
        div.className = 'search-result-item';
        div.innerHTML = `
          <img class="search-result-img" src="${a.cover}" alt="${a.title}" loading="lazy">
          <div class="search-result-info">
            <div class="search-result-title">${a.title}</div>
            <div class="search-result-meta">Ép. ${a.currentEp}/${a.totalEps||'?'} · ${statusLabel(a.status)}</div>
          </div>
          <span class="search-add-btn added">Dans ma liste</span>`;
        div.addEventListener('click', () => { clearSearch(); openModalById(a.id); });
        box.appendChild(div);
      });
    }
    if (remote.length > 0) {
      box.insertAdjacentHTML('beforeend', '<div class="search-section-header">🌐 AniList</div>');
      remote.forEach(a => {
        const inList = animeList.find(x => x.id === a.id);
        const title = a.title.french || a.title.romaji;
        const div = document.createElement('div');
        div.className = 'search-result-item';
        div.innerHTML = `
          <img class="search-result-img" src="${a.coverImage?.large || a.coverImage?.medium || ''}" alt="${title}" loading="lazy">
          <div class="search-result-info">
            <div class="search-result-title">${title}</div>
            <div class="search-result-meta">${FORMAT_FR[a.format]||a.format||'?'} · ${a.episodes||'?'} ép. · ${a.seasonYear||'?'}</div>
          </div>
          <button class="search-add-btn ${inList ? 'added' : ''}" data-id="${a.id}">${inList ? '✓ Ajouté' : '+ Ajouter'}</button>`;
        div.querySelector('.search-result-img, .search-result-info').addEventListener('click', () => { clearSearch(); openModalById(a.id); });
        const addBtn = div.querySelector('.search-add-btn');
        if (!inList) {
          addBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            addToList(a);
            addBtn.textContent = '✓ Ajouté';
            addBtn.classList.add('added');
          });
        }
        box.appendChild(div);
      });
    }
    if (local.length === 0 && remote.length === 0) {
      box.innerHTML = '<div class="search-empty">Aucun résultat pour "' + term + '"</div>';
    }
  } catch(e) {
    box.innerHTML = '<div class="search-empty">Erreur de recherche. Vérifie ta connexion.</div>';
  }
}

// =============================================
// LIST MANAGEMENT
// =============================================
function addToList(apiAnime) {
  const title = apiAnime.title?.french || apiAnime.title?.romaji || apiAnime.title || 'Inconnu';
  const entry = {
    id: apiAnime.id,
    title,
    cover: apiAnime.coverImage?.large || apiAnime.coverImage?.medium || apiAnime.cover || '',
    banner: apiAnime.bannerImage || apiAnime.banner || '',
    totalEps: apiAnime.episodes || apiAnime.totalEps || null,
    currentEp: apiAnime.currentEp || 0,
    status: apiAnime.status_local || 'planned',
    rating: apiAnime.rating || 0,
    note: apiAnime.note || '',
    addedAt: Date.now()
  };
  animeList.unshift(entry);
  save();
  renderGrid();
  updateStats();
  updateBadges();
  toast('success', `"${title}" ajouté à ta liste !`);
}

function removeFromList(id) {
  const a = animeList.find(x => x.id === id);
  if (!a) return;
  animeList = animeList.filter(x => x.id !== id);
  save();
  renderGrid();
  updateStats();
  updateBadges();
  toast('info', `"${a.title}" retiré de ta liste.`);
}

function updateEntry(id, patch) {
  const idx = animeList.findIndex(x => x.id === id);
  if (idx === -1) return;
  animeList[idx] = { ...animeList[idx], ...patch };
  save();
  updateStats();
  updateBadges();
  const card = document.querySelector(`.anime-card[data-id="${id}"]`);
  if (card) refreshCard(card, animeList[idx]);
}

// =============================================
// RENDER
// =============================================
function renderGrid() {
  const grid = document.getElementById('animeGrid');
  const list = currentFilter === 'all' ? animeList : animeList.filter(a => a.status === currentFilter);
  if (list.length === 0) {
    const msg = currentFilter === 'all'
      ? 'Recherche un animé ci-dessus pour commencer !'
      : 'Aucun animé dans cette catégorie.';
    grid.innerHTML = `
      <div class="empty-state">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        <h3>Ta liste est vide</h3>
        <p>${msg}</p>
      </div>`;
    return;
  }
  grid.innerHTML = '';
  list.forEach((a, i) => {
    const card = document.createElement('div');
    card.className = 'anime-card';
    card.dataset.id = a.id;
    card.style.animationDelay = Math.min(i * 0.05, 0.4) + 's';
    renderCardContent(card, a);
    grid.appendChild(card);
  });
}

function renderCardContent(card, a) {
  const pct = a.totalEps ? Math.round((a.currentEp / a.totalEps) * 100) : 0;
  card.innerHTML = `
    <button class="card-delete" data-id="${a.id}" title="Retirer" onclick="removeFromList(${a.id})">✕</button>
    <div class="anime-cover-wrap" onclick="openModalById(${a.id})">
      <img class="anime-cover" src="${a.cover}" alt="${a.title}" loading="lazy">
      <div class="anime-cover-overlay">
        <div class="cover-play-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
      </div>
    </div>
    <div class="anime-card-body">
      <div class="anime-card-title">${a.title}</div>
      <span class="status-badge status-${a.status}">${statusLabel(a.status)}</span>
      ${a.rating ? `<div class="card-rating-preview">${Array.from({length:10},(_,i)=>`<span class="card-star-preview">${i < a.rating ? '⭐' : '☆'}</span>`).join('')}</div>` : ''}
      ${a.note ? `<div class="card-note-preview">"${a.note}"</div>` : ''}
      <div class="episode-row">
        <button class="ep-btn" onclick="changeEp(${a.id},-1)">−</button>
        <input class="ep-input" type="number" min="0" max="${a.totalEps||9999}" value="${a.currentEp}" onchange="changeEpDirect(${a.id},this.value)" onclick="event.stopPropagation()">
        <span class="ep-total">/ ${a.totalEps||'?'}</span>
        <button class="ep-btn" onclick="changeEp(${a.id},1)">+</button>
      </div>
      ${a.totalEps ? `<div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>` : ''}
      <select class="status-select" onchange="changeStatus(${a.id},this.value)">
        <option value="watching" ${a.status==='watching'?'selected':''}>▶ En cours</option>
        <option value="completed" ${a.status==='completed'?'selected':''}>✓ Terminé</option>
        <option value="planned" ${a.status==='planned'?'selected':''}>📅 À voir</option>
        <option value="dropped" ${a.status==='dropped'?'selected':''}>✗ Abandonné</option>
      </select>
    </div>`;
}

function refreshCard(card, a) {
  renderCardContent(card, a);
}

function statusLabel(s) {
  return {watching:'En cours',completed:'Terminé',planned:'À voir',dropped:'Abandonné'}[s] || s;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + f);
  const fb = document.getElementById('filter-' + f);
  if (nb) nb.classList.add('active');
  if (fb) fb.classList.add('active');
  renderGrid();
}

function changeEp(id, delta) {
  const a = animeList.find(x => x.id === id);
  if (!a) return;
  const newEp = Math.max(0, Math.min(a.currentEp + delta, a.totalEps || 9999));
  let patch = { currentEp: newEp };
  if (a.totalEps && newEp === a.totalEps && a.status !== 'completed') {
    patch.status = 'completed';
    toast('success', `"${a.title}" terminé ! 🎉`);
    launchConfetti();
  }
  updateEntry(id, patch);
}

function changeEpDirect(id, val) {
  const a = animeList.find(x => x.id === id);
  if (!a) return;
  const newEp = Math.max(0, Math.min(parseInt(val)||0, a.totalEps || 9999));
  let patch = { currentEp: newEp };
  if (a.totalEps && newEp === a.totalEps && a.status !== 'completed') {
    patch.status = 'completed';
    toast('success', `"${a.title}" terminé ! 🎉`);
    launchConfetti();
  }
  updateEntry(id, patch);
  if (currentModalLocal && currentModalLocal.id === id) {
    const inp = document.getElementById('modalEpInput');
    if (inp) inp.value = newEp;
  }
}

function changeStatus(id, val) {
  updateEntry(id, { status: val });
  if (currentFilter !== 'all') renderGrid();
}

function updateStats() {
  const total = animeList.length;
  const eps = animeList.reduce((s, a) => s + a.currentEp, 0);
  const rated = animeList.filter(a => a.rating > 0);
  const avg = rated.length ? (rated.reduce((s, a) => s + a.rating, 0) / rated.length).toFixed(1) : '—';
  const completed = animeList.filter(a => a.status === 'completed').length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statEps').textContent = eps;
  document.getElementById('statRating').textContent = avg;
  document.getElementById('statCompleted').textContent = completed;
}

function updateBadges() {
  document.getElementById('badge-all').textContent = animeList.length;
  document.getElementById('badge-watching').textContent = animeList.filter(a=>a.status==='watching').length;
  document.getElementById('badge-completed').textContent = animeList.filter(a=>a.status==='completed').length;
  document.getElementById('badge-planned').textContent = animeList.filter(a=>a.status==='planned').length;
  document.getElementById('badge-dropped').textContent = animeList.filter(a=>a.status==='dropped').length;
}

// =============================================
// MODAL
// =============================================
async function openModalById(id) {
  const overlay = document.getElementById('modalOverlay');
  const body = document.getElementById('modalBody');
  const banner = document.getElementById('modalBanner');
  const cover = document.getElementById('modalCover');
  currentModal = id;
  currentModalLocal = animeList.find(x => x.id === id) || null;
  body.innerHTML = `<div style="padding:var(--space-12);text-align:center;color:var(--text-muted)"><span class="search-spinner" style="width:28px;height:28px;border-width:3px"></span></div>`;
  banner.src = ''; cover.src = '';
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  try {
    const a = await fetchAnimeDetails(id);
    const local = animeList.find(x => x.id === id);
    const title = a.title.french || a.title.romaji;
    const statusClass = {RELEASING:'airing',FINISHED:'finished',NOT_YET_RELEASED:'not-started'}[a.status] || '';
    banner.src = a.bannerImage || a.coverImage.extraLarge || a.coverImage.large;
    cover.src = a.coverImage.extraLarge || a.coverImage.large;
    cover.alt = title;
    let nextEpInfo = '';
    if (a.nextAiringEpisode) {
      const h = Math.floor(a.nextAiringEpisode.timeUntilAiring / 3600);
      const d = Math.floor(h / 24);
      nextEpInfo = `<div class="modal-chip airing">Ép. ${a.nextAiringEpisode.episode} dans ${d > 0 ? d + 'j ' : ''}${h % 24}h</div>`;
    }
    const synopsis = a.description ? a.description.replace(/<br>/g, '\n').replace(/<[^>]+>/g, '').trim() : 'Aucun synopsis disponible.';
    const genres = a.genres?.map(g => `<span class="modal-genre">${GENRES_FR[g]||g}</span>`).join('') || '';
    const studio = a.studios?.nodes?.[0]?.name || '?';
    body.innerHTML = `
      <div class="modal-title-row">
        <div>
          <div class="modal-title">${title}</div>
          ${a.title.native ? `<div class="modal-native">${a.title.native}</div>` : ''}
        </div>
      </div>
      <div class="modal-meta-row">
        ${a.averageScore ? `<span class="modal-chip score">⭐ ${(a.averageScore/10).toFixed(1)}/10</span>` : ''}
        ${a.format ? `<span class="modal-chip">${FORMAT_FR[a.format]||a.format}</span>` : ''}
        ${a.status ? `<span class="modal-chip ${statusClass}">${STATUS_FR[a.status]||a.status}</span>` : ''}
        ${a.seasonYear ? `<span class="modal-chip">${a.season ? SEASON_FR[a.season]+' ' : ''}${a.seasonYear}</span>` : ''}
        ${nextEpInfo}
      </div>
      <div>
        <div class="modal-section-title">Synopsis</div>
        <div class="modal-synopsis" id="modalSynopsis">${synopsis}</div>
      </div>
      ${genres ? `<div><div class="modal-section-title">Genres</div><div class="modal-genres">${genres}</div></div>` : ''}
      <div>
        <div class="modal-section-title">Infos</div>
        <div class="modal-stats-grid">
          <div class="modal-stat"><div class="modal-stat-val">${a.episodes||'?'}</div><div class="modal-stat-lbl">Épisodes</div></div>
          <div class="modal-stat"><div class="modal-stat-val">${a.duration ? a.duration+'min' : '?'}</div><div class="modal-stat-lbl">Durée/ép.</div></div>
          <div class="modal-stat"><div class="modal-stat-val">${studio}</div><div class="modal-stat-lbl">Studio</div></div>
          <div class="modal-stat"><div class="modal-stat-val">${a.source ? SOURCE_FR[a.source]||a.source : '?'}</div><div class="modal-stat-lbl">Source</div></div>
        </div>
      </div>
      ${local ? buildProgressSection(local, a) : `
        <button class="modal-add-btn" onclick="addFromModal(${id})">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Ajouter à ma liste
        </button>`}`;
  } catch(e) {
    body.innerHTML = `<div style="padding:var(--space-8);text-align:center;color:var(--text-muted)">Impossible de charger les détails.<br><small>${e.message}</small></div>`;
  }
}

function buildProgressSection(local, apiData) {
  const pct = local.totalEps ? Math.round(local.currentEp / local.totalEps * 100) : 0;
  const totalEps = apiData?.episodes || local.totalEps || '?';
  const ratingStars = Array.from({length:10}, (_, i) =>
    `<span class="rating-star ${i < local.rating ? 'active' : ''}" data-val="${i+1}" onclick="setRating(${local.id},${i+1})" onmouseenter="hoverStars(${i+1})" onmouseleave="unhoverStars(${local.rating})">⭐</span>`
  ).join('');
  return `
    <div>
      <div class="modal-section-title">Mon suivi</div>
      <div class="modal-progress-section">
        <div class="modal-ep-row">
          <span class="modal-ep-label">Épisode actuel</span>
          <div class="modal-ep-btns">
            <button class="modal-ep-btn" onclick="changeEp(${local.id},-5);refreshModalEp(${local.id})">-5</button>
            <button class="modal-ep-btn" onclick="changeEp(${local.id},-1);refreshModalEp(${local.id})">-1</button>
          </div>
          <input class="modal-ep-input" id="modalEpInput" type="number" min="0" max="${totalEps}" value="${local.currentEp}" onchange="changeEpDirect(${local.id},this.value);refreshModalEp(${local.id})">
          <span class="modal-ep-sep">/</span>
          <span class="modal-ep-total">${totalEps}</span>
          <div class="modal-ep-btns">
            <button class="modal-ep-btn" onclick="changeEp(${local.id},1);refreshModalEp(${local.id})">+1</button>
            <button class="modal-ep-btn" onclick="changeEp(${local.id},5);refreshModalEp(${local.id})">+5</button>
          </div>
        </div>
        ${local.totalEps ? `<div class="progress-bar-wrap"><div class="progress-bar" id="modalProgressBar" style="width:${pct}%"></div></div>` : ''}
        <div style="display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap">
          <span style="font-size:var(--text-sm);color:var(--text-muted);font-weight:500">Statut</span>
          <select class="modal-status-select" onchange="changeStatus(${local.id},this.value)">
            <option value="watching" ${local.status==='watching'?'selected':''}>▶ En cours</option>
            <option value="completed" ${local.status==='completed'?'selected':''}>✓ Terminé</option>
            <option value="planned" ${local.status==='planned'?'selected':''}>📅 À voir</option>
            <option value="dropped" ${local.status==='dropped'?'selected':''}>✗ Abandonné</option>
          </select>
        </div>
      </div>
    </div>
    <div>
      <div class="modal-section-title">Ma note</div>
      <div class="rating-row">
        <span class="rating-label">Note</span>
        <div class="rating-stars" id="modalStars">${ratingStars}</div>
        <span class="rating-val" id="modalRatingVal">${local.rating ? local.rating+'/10' : ''}</span>
      </div>
    </div>
    <div>
      <div class="modal-section-title">Mon avis</div>
      <div class="comment-wrap">
        <textarea class="comment-textarea" id="commentArea" placeholder="Écris ton avis, tes notes...">${local.note}</textarea>
        <button class="comment-save-btn" onclick="saveComment(${local.id})">Sauvegarder</button>
      </div>
    </div>
    <div style="padding-bottom:var(--space-2)">
      <button onclick="removeFromList(${local.id});closeModal()" style="color:var(--red);font-size:var(--text-xs);opacity:0.7;padding:var(--space-2)">Retirer de ma liste</button>
    </div>`;
}

function refreshModalEp(id) {
  const local = animeList.find(x => x.id === id);
  if (!local) return;
  const inp = document.getElementById('modalEpInput');
  const bar = document.getElementById('modalProgressBar');
  if (inp) inp.value = local.currentEp;
  if (bar && local.totalEps) bar.style.width = Math.round(local.currentEp/local.totalEps*100) + '%';
}

function addFromModal(id) {
  fetchAnimeDetails(id).then(a => {
    const fakeAnime = {
      id: a.id,
      title: { french: a.title.french, romaji: a.title.romaji },
      coverImage: a.coverImage,
      bannerImage: a.bannerImage,
      episodes: a.episodes
    };
    addToList(fakeAnime);
    openModalById(id);
  });
}

function setRating(id, val) {
  updateEntry(id, { rating: val });
  const stars = document.querySelectorAll('#modalStars .rating-star');
  stars.forEach((s, i) => s.classList.toggle('active', i < val));
  const rv = document.getElementById('modalRatingVal');
  if (rv) rv.textContent = val + '/10';
}

function hoverStars(n) {
  document.querySelectorAll('#modalStars .rating-star').forEach((s, i) => s.classList.toggle('hovered', i < n));
}

function unhoverStars(current) {
  document.querySelectorAll('#modalStars .rating-star').forEach(s => s.classList.remove('hovered'));
}

function saveComment(id) {
  const txt = document.getElementById('commentArea')?.value;
  updateEntry(id, { note: txt });
  const btn = document.querySelector('.comment-save-btn');
  if (btn) {
    const orig = btn.textContent;
    btn.textContent = 'Sauvegardé !';
    btn.style.background = 'var(--green)';
    setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 1500);
  }
  toast('success', 'Avis sauvegardé !');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  currentModal = null;
  currentModalLocal = null;
}

function handleModalClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('modalOverlay').classList.contains('open')) closeModal();
});

// =============================================
// TOAST
// =============================================
function toast(type, msg) {
  const icons = {success:'✓',error:'✕',info:'ℹ'};
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 300); }, 3200);
}

// =============================================
// CONFETTI
// =============================================
function launchConfetti() {
  const colors = ['7c6af7','34d399','f59e0b','f472b6','60a5fa','f87171'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `left:${Math.random()*100}vw;background:#${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${2.5+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;transform:rotate(${Math.random()*360}deg);width:${6+Math.random()*8}px;height:${10+Math.random()*12}px`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 5000);
  }
}

// =============================================
// THEME
// =============================================
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  const btn = document.getElementById('themeToggle');
  btn.innerHTML = isDark
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
}

// =============================================
// INIT
// =============================================
renderGrid();
updateStats();
updateBadges();
loadTrending();
</script>
</body>
</html>
